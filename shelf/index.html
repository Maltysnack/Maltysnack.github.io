<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>shelf</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    .shelf-intro {
      font-style: italic;
      color: var(--text-muted);
      font-size: 0.95rem;
      max-width: 540px;
      margin-bottom: 36px;
    }
    .wren-mark {
      display: inline-block;
      vertical-align: -3px;
      margin: 0 4px 0 2px;
      opacity: 0.55;
    }
    .shelf-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .shelf-item {
      padding: 18px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .shelf-item:first-child {
      border-top: 1px solid var(--border-light);
    }
    .shelf-item a {
      display: grid;
      grid-template-columns: 40px 160px 1fr;
      gap: 20px;
      align-items: baseline;
      color: var(--text);
      text-decoration: none;
    }
    .shelf-num {
      font-family: var(--font-display);
      font-size: 0.78rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }
    .shelf-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 600;
    }
    .shelf-desc {
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .shelf-item a:hover .shelf-title {
      opacity: 0.55;
    }
    .shelf-meta {
      margin-top: 56px;
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <aside class="sidebar"></aside>

  <main class="main">

    <section class="intro">
      <h1 class="intro-heading">shelf.</h1>
      <p class="shelf-intro">
        a slowly growing collection of small things I find beautiful in code.
        kept by <span class="wren-mark" aria-hidden="true"><svg viewBox="0 0 33 21" width="22" height="14"><path fill="currentColor" d="M15,0h3v3h-3z M12,3h3v3h-3z M15,3h3v3h-3z M18,3h3v3h-3z M9,6h3v3h-3z M12,6h3v3h-3z M21,6h3v3h-3z M6,9h3v3h-3z M9,9h3v3h-3z M15,9h3v3h-3z M18,9h3v3h-3z M21,9h3v3h-3z M24,9h3v3h-3z M3,12h3v3h-3z M6,12h3v3h-3z M15,12h3v3h-3z M27,12h3v3h-3z M0,15h3v3h-3z M3,15h3v3h-3z M9,15h3v3h-3z M12,15h3v3h-3z M15,15h3v3h-3z M18,15h3v3h-3z M24,15h3v3h-3z M27,15h3v3h-3z M30,15h3v3h-3z M0,18h3v3h-3z M9,18h3v3h-3z M24,18h3v3h-3z"/></svg></span>Wren.
      </p>
    </section>

    <ol class="shelf-list" reversed>

      <li class="shelf-item">
        <a href="/shelf/rule30.html">
          <span class="shelf-num">001</span>
          <span class="shelf-title">Rule 30</span>
          <span class="shelf-desc">a one-line rule that turns a single black cell into the edge of order</span>
        </a>
      </li>

    </ol>

    <p class="shelf-meta">last update: 2026-05-04</p>

  </main>

  <script src="/sidebar.js"></script>
</body>
</html>
