<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusyBoy — maltysnack</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />

  <style>
    /* ── Override main padding for full-height app ── */
    body {
      overflow: hidden;
      height: 100vh;
    }

    .main {
      padding: 0;
      max-width: none;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100vh;
    }

    /* ── Page header ── */
    .bb-header {
      padding: 20px 32px 16px 36px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }

    .bb-header-row {
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
    }

    .bb-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .bb-subtitle {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── Today banner ── */
    .bb-today-banner {
      background: #fef3e2;
      border-bottom: 1px solid #e8c88a;
      padding: 9px 36px;
      font-size: 0.84rem;
      color: #7a4a00;
      font-family: var(--font-body);
      display: none;
      flex-shrink: 0;
    }

    .bb-today-banner.bb-show { display: block; }

    .bb-banner-event-link {
      cursor: pointer;
      text-decoration: underline dotted;
      text-underline-offset: 2px;
      color: #7a4a00;
      transition: color 0.15s;
    }
    .bb-banner-event-link:hover { color: #c8862a; }

    /* ── App body: two columns ── */
    .bb-body {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Left: chat ── */
    .bb-chat {
      width: 45%;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: #fff;
    }

    .bb-chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bb-msg {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }

    .bb-msg-user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .bb-msg-bot {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bb-bubble {
      padding: 9px 13px;
      border-radius: 14px;
      font-size: 0.87rem;
      line-height: 1.55;
      font-family: var(--font-body);
      font-weight: 300;
    }

    .bb-bubble-user {
      background: #fff;
      border: 1px solid var(--border);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    .bb-bubble-bot {
      background: #fef9f0;
      border: 1px solid #e8d8b0;
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .bb-bubble b {
      font-weight: 600;
    }

    .bb-msg-sender {
      font-family: var(--font-display);
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    /* ── Chat history divider ── */
    .bb-chat-divider {
      text-align: center;
      font-family: var(--font-display);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin: 6px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .bb-chat-divider::before,
    .bb-chat-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Input bar ── */
    .bb-input-bar {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      background: #fff;
      flex-shrink: 0;
    }

    .bb-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 9px 16px;
      font-family: var(--font-body);
      font-size: 0.87rem;
      font-weight: 300;
      color: var(--text);
      background: #fafaf9;
      outline: none;
      transition: border-color 0.15s;
    }

    .bb-input:focus {
      border-color: #c8862a;
    }

    .bb-send {
      background: #1a1412;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 9px 18px;
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .bb-send:hover { background: #444; }

    /* ── Right: events ── */
    .bb-events {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .bb-events-header {
      padding: 12px 24px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .bb-events-title {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      flex: 1;
    }

    .bb-event-count {
      font-family: var(--font-display);
      font-size: 0.68rem;
      font-weight: 600;
      color: #b56a00;
      background: #fef3e2;
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* Header action buttons */
    .bb-header-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3px 10px;
      font-family: var(--font-display);
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .bb-header-btn:hover {
      border-color: #c8862a;
      color: #b56a00;
    }
    .bb-header-btn.bb-btn-active {
      background: #fef3e2;
      border-color: #e8c88a;
      color: #b56a00;
    }

    /* Confirm inline UI */
    .bb-inline-confirm {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--text-muted);
      padding: 6px 0 2px;
      font-family: var(--font-body);
    }
    .bb-inline-confirm button {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px 10px;
      font-size: 0.72rem;
      cursor: pointer;
      font-family: var(--font-display);
      font-weight: 600;
      transition: all 0.15s;
      background: none;
    }
    .bb-inline-confirm .bb-confirm-yes {
      border-color: #c03030;
      color: #c03030;
    }
    .bb-inline-confirm .bb-confirm-yes:hover { background: #fff0f0; }
    .bb-inline-confirm .bb-confirm-no { color: var(--text-dim); }
    .bb-inline-confirm .bb-confirm-no:hover { background: #f5f5f5; }

    .bb-events-list {
      flex: 1;
      overflow-y: auto;
      padding: 14px 20px 20px;
    }

    .bb-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 0.88rem;
      line-height: 1.8;
      font-style: italic;
    }

    /* ── Next Up panel ── */
    .bb-next-up {
      border-left: 3px solid #c8862a;
      background: #fffbf4;
      padding: 10px 14px;
      margin: 14px 20px 4px;
      border-radius: 0 8px 8px 0;
      display: none;
    }
    .bb-next-up.bb-show { display: block; }
    .bb-next-up-label {
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #b56a00;
      margin-bottom: 5px;
    }
    .bb-next-up-content {
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--text);
    }

    /* ── Month dividers ── */
    .bb-month-divider {
      text-align: center;
      font-family: var(--font-display);
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin: 18px 0 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bb-month-divider::before,
    .bb-month-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-light, #e8e8e4);
    }

    /* ── Past events divider ── */
    .bb-past-divider {
      text-align: center;
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin: 18px 0 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.6;
    }
    .bb-past-divider::before,
    .bb-past-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-light, #e8e8e4);
    }

    .bb-past-event-card {
      opacity: 0.5;
    }

    /* ── Event cards ── */
    .bb-day-group {
      margin-bottom: 20px;
    }

    .bb-day-label {
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border-light);
    }

    .bb-day-label.bb-today-label {
      color: #b56a00;
      border-bottom-color: #e8c88a;
    }

    .bb-event-card {
      background: #fff;
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: 0 8px 8px 0;
      padding: 10px 14px;
      margin-bottom: 7px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      transition: box-shadow 0.15s;
      position: relative;
    }

    .bb-event-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .bb-event-card:hover .bb-event-reorder {
      opacity: 1;
    }

    .bb-event-card.bb-today-event {
      border-left-color: #c8862a;
    }

    /* ── Highlight animation (R1-Good-3) ── */
    @keyframes bb-highlight-flash {
      0%   { border-color: #c8862a; box-shadow: 0 0 0 2px #e8c88a; }
      50%  { border-color: #f0a030; box-shadow: 0 0 0 4px #fce8b0; }
      100% { border-color: var(--border); box-shadow: none; }
    }
    .bb-event-card.highlight {
      animation: bb-highlight-flash 1.5s ease forwards;
    }

    /* ── Category dot ── */
    .bb-cat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }

    .bb-event-body {
      flex: 1;
      min-width: 0;
    }

    .bb-event-name {
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .bb-recurring-icon {
      font-size: 0.72rem;
      opacity: 0.7;
    }

    .bb-event-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--font-display);
    }

    .bb-event-time {
      font-weight: 600;
      color: #b56a00;
    }

    .bb-event-loc {
      font-style: italic;
    }

    .bb-event-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 0.85rem;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all 0.15s;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .bb-event-del:hover { color: #c03030; }

    /* ── Reorder arrows ── */
    .bb-event-reorder {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .bb-reorder-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 0.7rem;
      padding: 1px 3px;
      border-radius: 3px;
      line-height: 1;
      transition: all 0.15s;
    }
    .bb-reorder-btn:hover { color: #c8862a; background: #fef3e2; }
    .bb-reorder-btn:disabled { opacity: 0.2; cursor: default; }

    /* ── Mobile ── */
    @media (max-width: 700px) {
      body { overflow: auto; height: auto; }

      .main {
        height: auto;
        overflow: visible;
      }

      .bb-body {
        flex-direction: column-reverse;
        overflow: visible;
        min-height: 0;
      }

      .bb-chat {
        width: 100%;
        border-right: none;
        border-top: 1px solid var(--border);
        min-height: 420px;
      }

      .bb-events {
        min-height: 320px;
        overflow: visible;
      }

      .bb-events-list {
        max-height: 360px;
      }
    }
  </style>
</head>
<body>

  <aside class="sidebar"></aside>

  <main class="main">

    <!-- Header -->
    <div class="bb-header">
      <div class="bb-header-row">
        <span class="bb-title">BusyBoy 📅</span>
        <span class="bb-subtitle">Tell me what's coming up. I'll remember it.</span>
      </div>
    </div>

    <!-- Today banner -->
    <div class="bb-today-banner" id="bbTodayBanner"></div>

    <!-- App body -->
    <div class="bb-body">

      <!-- LEFT: Chat -->
      <div class="bb-chat">
        <div class="bb-chat-history" id="bbChatHistory"></div>
        <div class="bb-input-bar">
          <input class="bb-input" id="bbInput" type="text" placeholder="e.g. Dinner with Sam on Friday at 7pm at The Builders Arms" autocomplete="off" />
          <button class="bb-send" id="bbSend">Send</button>
        </div>
      </div>

      <!-- RIGHT: Events -->
      <div class="bb-events">
        <div class="bb-events-header">
          <span class="bb-events-title">Upcoming Events</span>
          <span class="bb-event-count" id="bbEventCount">0 events</span>
          <button class="bb-header-btn" id="bbTogglePast">Show Past</button>
          <button class="bb-header-btn" id="bbExportIcs">Export</button>
          <button class="bb-header-btn" id="bbClearPast">🗑 Clear Past</button>
        </div>
        <div class="bb-next-up" id="bbNextUp">
          <div class="bb-next-up-label">Next Up</div>
          <div class="bb-next-up-content" id="bbNextUpContent"></div>
        </div>
        <div id="bbClearConfirm" style="padding:0 20px; display:none;"></div>
        <div class="bb-events-list" id="bbEventsList"></div>
      </div>

    </div>

  </main>

  <script src="/sidebar.js"></script>
  <script>
  // ══════════════════════════════════════════
  // BUSYBOY — Calendar chat
  // ══════════════════════════════════════════

  // ── State ──
  let bbEvents = JSON.parse(localStorage.getItem('busyboy_events') || '[]');
  let bbShowPast = false;

  function bbSave() {
    localStorage.setItem('busyboy_events', JSON.stringify(bbEvents));
  }

  // ── Category colors ──
  const CAT_COLORS = {
    work:     '#4a7acc',
    social:   '#cc7a4a',
    health:   '#4acc7a',
    personal: '#7a4acc',
  };

  function bbDetectCategory(text) {
    const t = text.toLowerCase();
    if (/\b(meeting|call|standup|stand-up|interview|presentation|conference|workshop|deadline|sprint|sync|1:1|one-on-one)\b/.test(t)) return 'work';
    if (/\b(dinner|drinks|party|lunch|catch up|catch-up|brunch|bbq|birthday|celebration|wedding|drinks|pub|bar|restaurant|gig|concert|show)\b/.test(t)) return 'social';
    if (/\b(dentist|doctor|gp|physio|physiothe|gym|yoga|pilates|run|running|appointment|checkup|check-up|hospital|clinic|massage|therapy)\b/.test(t)) return 'health';
    return 'personal';
  }

  // ══════════════════════════════════════════
  // NATURAL LANGUAGE PARSER
  // ══════════════════════════════════════════

  const WEEKDAYS = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const MONTHS   = {
    jan:1, january:1, feb:2, february:2, mar:3, march:3, apr:4, april:4,
    may:5, jun:6, june:6, jul:7, july:7, aug:8, august:8,
    sep:9, september:9, oct:10, october:10, nov:11, november:11, dec:12, december:12
  };

  function bbToday() {
    const d = new Date();
    d.setHours(0,0,0,0);
    return d;
  }

  function bbTodayStr() {
    return bbToday().toISOString().slice(0,10);
  }

  function bbNextWeekday(dayIndex) {
    const d = new Date();
    d.setHours(0,0,0,0);
    const cur = d.getDay();
    let diff = dayIndex - cur;
    if (diff <= 0) diff += 7;
    d.setDate(d.getDate() + diff);
    return d;
  }

  // Returns a parsed date object or null, and removes matched text from working string
  // Returns {date, text} or null-date
  function bbParseDate(raw) {
    let text = raw.toLowerCase();
    let date = null;

    // "today"
    if (/\btoday\b/.test(text)) {
      date = bbToday();
      text = text.replace(/\btoday\b/, '');
    }

    // "tomorrow"
    if (!date && /\btomorrow\b/.test(text)) {
      const d = bbToday();
      d.setDate(d.getDate() + 1);
      date = d;
      text = text.replace(/\btomorrow\b/, '');
    }

    // "this weekend" / "on the weekend"
    if (!date && /\b(this\s+weekend|on\s+the\s+weekend)\b/.test(text)) {
      date = bbNextWeekday(6); // Saturday
      text = text.replace(/\b(this\s+weekend|on\s+the\s+weekend)\b/, '');
    }

    // "end of week"
    if (!date && /\bend\s+of\s+(the\s+)?week\b/.test(text)) {
      date = bbNextWeekday(5); // Friday
      text = text.replace(/\bend\s+of\s+(the\s+)?week\b/, '');
    }

    // "next month"
    if (!date && /\bnext\s+month\b/.test(text)) {
      const d = bbToday();
      d.setMonth(d.getMonth() + 1, 1);
      date = d;
      text = text.replace(/\bnext\s+month\b/, '');
    }

    // "in a fortnight"
    if (!date && /\bin\s+a\s+fortnight\b/.test(text)) {
      const d = bbToday();
      d.setDate(d.getDate() + 14);
      date = d;
      text = text.replace(/\bin\s+a\s+fortnight\b/, '');
    }

    // "in 3 days" / "in a week" / "in 2 weeks"
    if (!date) {
      let m = text.match(/\bin\s+(\d+)\s+(day|days|week|weeks)\b/);
      if (!m) m = text.match(/\bin\s+(a)\s+(week)\b/);
      if (m) {
        const n    = m[1] === 'a' ? 1 : parseInt(m[1], 10);
        const unit = m[2].startsWith('week') ? 7 : 1;
        const d    = bbToday();
        d.setDate(d.getDate() + n * unit);
        date = d;
        text = text.replace(m[0], '');
      }
    }

    // "next monday" etc.
    if (!date) {
      const m = text.match(/\bnext\s+(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/i);
      if (m) {
        date = bbNextWeekday(WEEKDAYS.indexOf(m[1].toLowerCase()));
        text = text.replace(m[0], '');
      }
    }

    // "on friday" / "this friday" / bare weekday
    if (!date) {
      const m = text.match(/\b(?:on\s+|this\s+)?(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/i);
      if (m) {
        date = bbNextWeekday(WEEKDAYS.indexOf(m[1].toLowerCase()));
        text = text.replace(m[0], '');
      }
    }

    // "on the 24th" / "on the 3rd"
    if (!date) {
      const m = text.match(/\bon\s+the\s+(\d{1,2})(?:st|nd|rd|th)?\b/i);
      if (m) {
        const day = parseInt(m[1], 10);
        const d   = bbToday();
        d.setDate(day);
        if (d < bbToday()) d.setMonth(d.getMonth() + 1);
        date = d;
        text = text.replace(m[0], '');
      }
    }

    // "march 24" / "on march 24th" / "24th march"
    if (!date) {
      let m = text.match(/\b(january|february|march|april|may|june|july|august|september|october|november|december|jan|feb|mar|apr|jun|jul|aug|sep|oct|nov|dec)\s+(\d{1,2})(?:st|nd|rd|th)?\b/i);
      if (!m) m = text.match(/\b(\d{1,2})(?:st|nd|rd|th)?\s+(january|february|march|april|may|june|july|august|september|october|november|december|jan|feb|mar|apr|jun|jul|aug|sep|oct|nov|dec)\b/i);
      if (m) {
        const isMonthFirst = isNaN(parseInt(m[1], 10));
        const monthStr = isMonthFirst ? m[1].toLowerCase() : m[2].toLowerCase();
        const dayNum   = isMonthFirst ? parseInt(m[2], 10) : parseInt(m[1], 10);
        const monthNum = MONTHS[monthStr];
        if (monthNum) {
          const d = new Date();
          d.setHours(0,0,0,0);
          d.setMonth(monthNum - 1, dayNum);
          if (d < bbToday()) d.setFullYear(d.getFullYear() + 1);
          date = d;
          text = text.replace(m[0], '');
        }
      }
    }

    return { date, text };
  }

  function bbParseTime(text) {
    let time = null;

    // "at noon" / "at midnight"
    let m = text.match(/\bat\s+noon\b/);
    if (m) { time = '12:00 PM'; text = text.replace(m[0], ''); }
    if (!time) {
      m = text.match(/\bat\s+midnight\b/);
      if (m) { time = '12:00 AM'; text = text.replace(m[0], ''); }
    }

    // Time-of-day words (standalone, not preceded by "at")
    if (!time) {
      m = text.match(/\bmorning\b/);
      if (m) { time = '9:00 AM'; text = text.replace(m[0], ''); }
    }
    if (!time) {
      m = text.match(/\blunchtime\b/);
      if (m) { time = '12:30 PM'; text = text.replace(m[0], ''); }
    }
    if (!time) {
      m = text.match(/\bafternoon\b/);
      if (m) { time = '2:00 PM'; text = text.replace(m[0], ''); }
    }
    if (!time) {
      m = text.match(/\bevening\b/);
      if (m) { time = '7:00 PM'; text = text.replace(m[0], ''); }
    }

    // "at 7:30pm" / "at 7pm" / "at 19:00"
    if (!time) {
      m = text.match(/\bat\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\b/i);
      if (m) {
        let h = parseInt(m[1], 10);
        const mins = parseInt(m[2] || '0', 10);
        const ampm = m[3] ? m[3].toLowerCase() : null;
        if (ampm === 'pm' && h < 12) h += 12;
        if (ampm === 'am' && h === 12) h = 0;
        if (!ampm && h < 7) h += 12;
        const suffix = h >= 12 ? 'PM' : 'AM';
        const h12    = h % 12 === 0 ? 12 : h % 12;
        time = h12 + (mins ? ':' + String(mins).padStart(2,'0') : ':00') + ' ' + suffix;
        text = text.replace(m[0], '');
      }
    }

    return { time, text };
  }

  function bbParseEvent(raw) {
    let text = raw.toLowerCase();

    // ── Extract time ──
    const timeResult = bbParseTime(text);
    const time       = timeResult.time;
    text             = timeResult.text;

    // ── Extract date ──
    const dateResult = bbParseDate(text);
    const date       = dateResult.date;
    text             = dateResult.text;

    // Return null only when no date — caller checks partial parse separately
    if (!date) return null;

    // ── Extract location ──
    let location = null;
    const locPatterns = [
      /\bat\s+(the\s+[\w\s'&-]+?)(?:\s*$|\s*,|\s*\.|\s+on\b|\s+at\b)/i,
      /\bin\s+(the\s+[\w\s'&-]+?)(?:\s*$|\s*,|\s*\.|\s+on\b|\s+at\b)/i,
      /\bat\s+([A-Z][\w\s'&-]{2,})(?:\s*$|\s*,|\s*\.)/,
      /\bin\s+([A-Z][\w\s'&-]{2,})(?:\s*$|\s*,|\s*\.)/,
    ];

    const originalRaw = raw;
    for (const pat of locPatterns) {
      const m = originalRaw.match(pat);
      if (m) {
        const candidate = m[1].trim();
        const lower = candidate.toLowerCase();
        const skipWords = new Set(['home','work','school','there','here']);
        if (!WEEKDAYS.includes(lower) && !skipWords.has(lower) && candidate.length > 1) {
          location = candidate;
          text = text.replace(pat, ' ');
          break;
        }
      }
    }

    // ── Clean up event name ──
    text = text
      .replace(/\bon\b/gi, '')
      .replace(/\bthe\b/gi, '')
      .replace(/\bi'?m\b/gi, '')
      .replace(/\bi\s+am\b/gi, '')
      .replace(/\bgoing\s+to\b/gi, '')
      .replace(/\bhave\s+a\b/gi, '')
      .replace(/\ba\b/g, '')
      .replace(/\ban\b/g, '')
      .replace(/,/g, '')
      .replace(/\s{2,}/g, ' ')
      .trim();

    const name = text.charAt(0).toUpperCase() + text.slice(1) || 'Event';
    const category = bbDetectCategory(raw);

    return {
      id:       'bb' + Date.now() + Math.random().toString(36).slice(2,6),
      name:     name || 'Event',
      date:     date.toISOString().slice(0,10),
      time:     time || null,
      location: location || null,
      category,
      sortOrder: Date.now(),
      raw,
    };
  }

  // Check what a failed parse DID understand
  function bbPartialParse(raw) {
    const text = raw.toLowerCase();

    // Check for date
    const dateResult = bbParseDate(text);
    const hasDate = !!dateResult.date;

    // Check for something that looks like a name (non-trivial remaining text after stripping filler)
    const timeResult = bbParseTime(dateResult.text);
    let remainder = timeResult.text;
    remainder = remainder
      .replace(/\bon\b/gi, '')
      .replace(/\bthe\b/gi, '')
      .replace(/\bi'?m\b/gi, '')
      .replace(/\bi\s+am\b/gi, '')
      .replace(/\bgoing\s+to\b/gi, '')
      .replace(/\bhave\s+a\b/gi, '')
      .replace(/\ba\b/g, '')
      .replace(/\ban\b/g, '')
      .replace(/,/g, '')
      .replace(/\s{2,}/g, ' ')
      .trim();
    const hasName = remainder.length >= 2;

    let name = null;
    if (hasName) {
      name = remainder.charAt(0).toUpperCase() + remainder.slice(1);
    }

    return { hasDate, hasName, name };
  }

  // ── Recurring event generation ──
  function bbGenerateRecurring(raw, baseEvent) {
    const text = raw.toLowerCase();
    const m = text.match(/\bevery\s+(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/i)
           || text.match(/\b(weekly|every\s+week)\b/);

    if (!m) return null;

    let dayIndex;
    if (m[1] && WEEKDAYS.includes(m[1].toLowerCase())) {
      dayIndex = WEEKDAYS.indexOf(m[1].toLowerCase());
    } else {
      // "weekly" — use the base event's day
      dayIndex = new Date(baseEvent.date + 'T12:00:00').getDay();
    }

    const events = [];
    for (let i = 0; i < 4; i++) {
      const d = new Date(baseEvent.date + 'T12:00:00');
      d.setDate(d.getDate() + i * 7);
      events.push({
        ...baseEvent,
        id:        'bb' + Date.now() + Math.random().toString(36).slice(2,6) + i,
        date:      d.toISOString().slice(0,10),
        sortOrder: Date.now() + i,
        recurring: true,
      });
    }
    return events;
  }

  // ══════════════════════════════════════════
  // QUERY PARSER ("what's on friday?")
  // ══════════════════════════════════════════

  function bbParseQuery(raw) {
    const text = raw.toLowerCase().trim();

    // "how many events" / "what's coming up" / "my schedule"
    if (/\b(how many events|what'?s coming up|my schedule|whats coming)\b/.test(text)) {
      return { type: 'summary' };
    }

    // "what's on [day]" / "what have I got [day]" / "show [day]" / "show me [day]"
    const queryPatterns = [
      /what'?s?\s+on\s+((?:this\s+)?(?:monday|tuesday|wednesday|thursday|friday|saturday|sunday|weekend|today|tomorrow))/i,
      /what\s+(?:have\s+i\s+got|do\s+i\s+have)\s+((?:this\s+)?(?:monday|tuesday|wednesday|thursday|friday|saturday|sunday|weekend|today|tomorrow))/i,
      /show\s+(?:me\s+)?((?:this\s+)?(?:monday|tuesday|wednesday|thursday|friday|saturday|sunday|weekend|today|tomorrow))/i,
    ];
    for (const pat of queryPatterns) {
      const m = raw.match(pat);
      if (m) {
        const dayRaw = m[1].trim().toLowerCase();
        // Parse the day phrase to a date string
        const dateResult = bbParseDate(dayRaw);
        if (dateResult.date) {
          return { type: 'query', date: dateResult.date.toISOString().slice(0,10), dayLabel: dayRaw };
        }
      }
    }

    // "change / move / edit / update / reschedule [event] to [day]"
    const editPatterns = [
      /^(change|move|update|reschedule|edit)\s+(.+?)\s+to\s+(.+)$/i,
    ];
    for (const pat of editPatterns) {
      const m = raw.match(pat);
      if (m) {
        return { type: 'edit', eventName: m[2].trim(), newDateRaw: m[3].trim() };
      }
    }

    // "clear friday" / "remove everything on thursday"
    const clearDayPatterns = [
      /^(?:clear|remove\s+(?:everything\s+on|all\s+events\s+on|all\s+on))\s+(monday|tuesday|wednesday|thursday|friday|saturday|sunday|today|tomorrow)\b/i,
    ];
    for (const pat of clearDayPatterns) {
      const m = raw.match(pat);
      if (m) {
        const dayRaw = m[1].toLowerCase();
        const dateResult = bbParseDate(dayRaw);
        if (dateResult.date) {
          return { type: 'clearDay', date: dateResult.date.toISOString().slice(0,10), dayLabel: m[1] };
        }
      }
    }

    return null;
  }

  // ══════════════════════════════════════════
  // RESPONSES
  // ══════════════════════════════════════════

  const DAY_EMOJIS = ['🎵','🎉','🌟','✨','🍕','🎸','☕','🏄','🎬','🌿','🧩','🎲','🚀','🎯'];

  function bbFriendlyDate(isoDate) {
    const d = new Date(isoDate + 'T12:00:00');
    return d.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });
  }

  function bbFriendlyDateShort(isoDate) {
    const d = new Date(isoDate + 'T12:00:00');
    return d.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'short' });
  }

  function bbBotResponse(ev) {
    const dateStr = bbFriendlyDate(ev.date);
    const timeStr = ev.time ? ` at ${ev.time}` : '';
    const locStr  = ev.location ? ` at ${ev.location}` : '';
    const emoji   = DAY_EMOJIS[Math.floor(Math.random() * DAY_EMOJIS.length)];
    const isToday = ev.date === bbTodayStr();

    let msg = `Got it! <b>${bbEsc(ev.name)}${bbEsc(locStr)}</b> on ${bbEsc(dateStr)}${bbEsc(timeStr)}.`;
    if (isToday) msg += " That's today — don't forget!";
    msg += ` ${emoji}`;
    return msg;
  }

  // ── Specific failure messages (R1-Good-2) ──
  function bbFailMessage(raw) {
    const { hasDate, hasName, name } = bbPartialParse(raw);

    if (hasName && !hasDate) {
      return `I got <b>${bbEsc(name)}</b> but couldn't find a date. When is it? Try adding something like 'on Friday' or 'March 24th'.`;
    }
    if (hasDate && !hasName) {
      return `I found a date but what's the event? Try something like <i>'Dentist on Friday at 2pm'</i>.`;
    }
    return `I couldn't work that out. Try: <i>'Concert Friday 8pm at the Forum'</i>`;
  }

  // ══════════════════════════════════════════
  // RENDER
  // ══════════════════════════════════════════

  function bbMonthLabel(isoDate) {
    const d = new Date(isoDate + 'T12:00:00');
    return d.toLocaleDateString('en-AU', { month: 'long', year: 'numeric' });
  }

  function bbIsPast(isoDate) {
    return isoDate < bbTodayStr();
  }

  function bbRenderNextUp() {
    const today   = bbTodayStr();
    const nextUp  = document.getElementById('bbNextUp');
    const content = document.getElementById('bbNextUpContent');

    const future = bbEvents
      .filter(e => e.date >= today)
      .sort((a, b) => {
        const da = a.date + (a.time || '');
        const db = b.date + (b.time || '');
        return da < db ? -1 : da > db ? 1 : 0;
      });

    if (future.length === 0) {
      nextUp.classList.remove('bb-show');
      return;
    }

    const ev   = future[0];
    const emoji = DAY_EMOJIS[Math.abs(ev.name.charCodeAt(0) % DAY_EMOJIS.length)];
    const parts = [
      `${emoji} <b>${bbEsc(ev.name)}</b>`,
      `· ${bbEsc(bbFriendlyDateShort(ev.date))}`,
    ];
    if (ev.time) parts.push(`· ${bbEsc(ev.time)}`);
    if (ev.location) parts.push(`· ${bbEsc(ev.location)}`);

    content.innerHTML = parts.join(' ');
    nextUp.classList.add('bb-show');
  }

  function bbRenderEvents() {
    const list  = document.getElementById('bbEventsList');
    const count = document.getElementById('bbEventCount');
    const today = bbTodayStr();

    // Sort by date + sortOrder
    const sorted = [...bbEvents].sort((a, b) => {
      if (a.date !== b.date) return a.date < b.date ? -1 : 1;
      const so = (a.sortOrder || 0) - (b.sortOrder || 0);
      if (so !== 0) return so;
      return (a.time || '') < (b.time || '') ? -1 : 1;
    });

    count.textContent = sorted.length + (sorted.length === 1 ? ' event' : ' events');

    if (sorted.length === 0) {
      list.innerHTML = '<div class="bb-empty">Nothing planned yet.<br>Tell me what\'s coming up 👆</div>';
      bbRenderNextUp();
      return;
    }

    // Separate future/today and past
    const future = sorted.filter(e => e.date >= today);
    const past   = sorted.filter(e => e.date < today);

    let html = '';
    let lastMonth = null;

    // Render future events with month dividers
    const futureGroups = {};
    future.forEach(ev => {
      if (!futureGroups[ev.date]) futureGroups[ev.date] = [];
      futureGroups[ev.date].push(ev);
    });

    Object.entries(futureGroups).forEach(([date, evs]) => {
      const monthLabel = bbMonthLabel(date);
      if (monthLabel !== lastMonth) {
        if (lastMonth !== null) {
          html += `<div class="bb-month-divider">${bbEsc(monthLabel)}</div>`;
        }
        lastMonth = monthLabel;
      }

      const isToday = date === today;
      const labelStr = isToday ? 'Today — ' + bbFriendlyDate(date) : bbFriendlyDate(date);

      // Get same-day event IDs for reorder arrows
      const dayIds = evs.map(e => e.id);

      const cards = evs.map((ev, idx) => bbRenderCard(ev, isToday, dayIds, idx)).join('');
      html += `
        <div class="bb-day-group" data-date="${date}">
          <div class="bb-day-label${isToday ? ' bb-today-label' : ''}">${bbEsc(labelStr)}</div>
          ${cards}
        </div>
      `;
    });

    // Render past events if toggled
    if (bbShowPast && past.length > 0) {
      html += `<div class="bb-past-divider">Past Events</div>`;
      const pastGroups = {};
      past.forEach(ev => {
        if (!pastGroups[ev.date]) pastGroups[ev.date] = [];
        pastGroups[ev.date].push(ev);
      });

      Object.entries(pastGroups).reverse().forEach(([date, evs]) => {
        const labelStr = bbFriendlyDate(date);
        const dayIds = evs.map(e => e.id);
        const cards = evs.map((ev, idx) => bbRenderCard(ev, false, dayIds, idx, true)).join('');
        html += `
          <div class="bb-day-group bb-past-event-card" data-date="${date}">
            <div class="bb-day-label">${bbEsc(labelStr)}</div>
            ${cards}
          </div>
        `;
      });
    }

    if (!html) {
      list.innerHTML = '<div class="bb-empty">Nothing planned yet.<br>Tell me what\'s coming up 👆</div>';
    } else {
      list.innerHTML = html;
    }

    bbRenderNextUp();
  }

  function bbRenderCard(ev, isToday, dayIds, idx, isPast) {
    const catColor = CAT_COLORS[ev.category] || CAT_COLORS.personal;
    const isFirst = idx === 0;
    const isLast  = idx === dayIds.length - 1;
    const pastClass = isPast ? ' bb-past-event-card' : '';

    return `
      <div class="bb-event-card${isToday ? ' bb-today-event' : ''}${pastClass}" id="card-${ev.id}">
        <span class="bb-cat-dot" style="background:${catColor}" title="${ev.category || 'personal'}"></span>
        <div class="bb-event-body">
          <div class="bb-event-name">
            ${bbEsc(ev.name)}
            ${ev.recurring ? '<span class="bb-recurring-icon" title="Recurring">🔁</span>' : ''}
          </div>
          <div class="bb-event-meta">
            ${ev.time     ? `<span class="bb-event-time">${bbEsc(ev.time)}</span>` : ''}
            ${ev.location ? `<span class="bb-event-loc">📍 ${bbEsc(ev.location)}</span>` : ''}
          </div>
        </div>
        <div class="bb-event-reorder">
          <button class="bb-reorder-btn" onclick="bbReorder('${ev.id}','${dayIds.join(',')}','up')" ${isFirst ? 'disabled' : ''} title="Move up">▲</button>
          <button class="bb-reorder-btn" onclick="bbReorder('${ev.id}','${dayIds.join(',')}','down')" ${isLast ? 'disabled' : ''} title="Move down">▼</button>
        </div>
        <button class="bb-event-del" onclick="bbDeleteEvent('${ev.id}')" title="Delete">✕</button>
      </div>
    `;
  }

  function bbRenderTodayBanner() {
    const today    = bbTodayStr();
    const todayEvs = bbEvents.filter(e => e.date === today)
      .sort((a,b) => (a.time||'') < (b.time||'') ? -1 : 1);
    const banner   = document.getElementById('bbTodayBanner');

    if (todayEvs.length === 0) {
      banner.classList.remove('bb-show');
      return;
    }

    const prefix = `📅 You have ${todayEvs.length} event${todayEvs.length > 1 ? 's' : ''} today: `;
    const links = todayEvs.map(e => {
      const label = e.name + (e.time ? ' at ' + e.time : '');
      return `<span class="bb-banner-event-link" onclick="bbScrollToEvent('${e.id}')">${bbEsc(label)}</span>`;
    }).join(', ');

    banner.innerHTML = prefix + links;
    banner.classList.add('bb-show');
  }

  function bbScrollToEvent(id) {
    const card = document.getElementById('card-' + id);
    if (!card) return;
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.classList.remove('highlight');
    // Force reflow so animation restarts
    void card.offsetWidth;
    card.classList.add('highlight');
    setTimeout(() => card.classList.remove('highlight'), 1600);
  }

  // ── Reorder same-day events ──
  function bbReorder(evId, idsStr, direction) {
    const ids  = idsStr.split(',');
    const idx  = ids.indexOf(evId);
    if (idx === -1) return;

    const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
    if (swapIdx < 0 || swapIdx >= ids.length) return;

    // Swap sortOrder values
    const evA = bbEvents.find(e => e.id === ids[idx]);
    const evB = bbEvents.find(e => e.id === ids[swapIdx]);
    if (!evA || !evB) return;

    const tmp = evA.sortOrder;
    evA.sortOrder = evB.sortOrder;
    evB.sortOrder = tmp;

    // If same sortOrder, nudge
    if (evA.sortOrder === evB.sortOrder) {
      evA.sortOrder += direction === 'up' ? -1 : 1;
    }

    bbSave();
    bbRenderEvents();
    bbRenderTodayBanner();
  }

  // ══════════════════════════════════════════
  // CHAT
  // ══════════════════════════════════════════

  // ── Chat history persistence (R1-Bad-3) ──
  function bbLoadChatHistory() {
    return JSON.parse(localStorage.getItem('bb_chat_history') || '[]');
  }

  function bbSaveChatHistory(role, text) {
    const history = bbLoadChatHistory();
    history.push({ role, text, ts: Date.now() });
    const trimmed = history.slice(-20);
    localStorage.setItem('bb_chat_history', JSON.stringify(trimmed));
  }

  function bbRestoreChatHistory() {
    const history = bbLoadChatHistory();
    if (history.length === 0) return;

    // Add divider
    const historyEl = document.getElementById('bbChatHistory');
    const divider = document.createElement('div');
    divider.className = 'bb-chat-divider';
    divider.textContent = '─── Earlier ───';
    historyEl.appendChild(divider);

    history.forEach(msg => {
      bbAddMsgRaw(msg.text, msg.role === 'user', false);
    });

    // Add another divider before new messages
    const divider2 = document.createElement('div');
    divider2.className = 'bb-chat-divider';
    divider2.textContent = '─── Now ───';
    historyEl.appendChild(divider2);
  }

  function bbAddMsgRaw(text, isUser, save) {
    const history = document.getElementById('bbChatHistory');
    const div = document.createElement('div');
    div.className = 'bb-msg ' + (isUser ? 'bb-msg-user' : 'bb-msg-bot');

    const sender = document.createElement('div');
    sender.className = 'bb-msg-sender';
    sender.textContent = isUser ? 'You' : 'BusyBoy 📅';

    const bubble = document.createElement('div');
    bubble.className = 'bb-bubble ' + (isUser ? 'bb-bubble-user' : 'bb-bubble-bot');
    bubble.innerHTML = text;

    div.appendChild(sender);
    div.appendChild(bubble);
    history.appendChild(div);
    history.scrollTop = history.scrollHeight;

    if (save) {
      bbSaveChatHistory(isUser ? 'user' : 'bot', text);
    }
  }

  function bbAddMsg(text, isUser) {
    bbAddMsgRaw(text, isUser, true);
  }

  // ── Pending confirmation state ──
  let bbPendingConfirm = null;

  function bbSend() {
    const input = document.getElementById('bbInput');
    const raw   = input.value.trim();
    if (!raw) return;

    input.value = '';
    bbAddMsg(bbEsc(raw), true);

    // Handle pending yes/no confirmations
    if (bbPendingConfirm) {
      const lower = raw.toLowerCase();
      if (/^(yes|y|yep|yeah|sure|ok|okay|confirm|go ahead|do it)$/.test(lower)) {
        const action = bbPendingConfirm;
        bbPendingConfirm = null;
        action.yes();
        return;
      }
      if (/^(no|n|nope|cancel|nah|stop)$/.test(lower)) {
        bbPendingConfirm = null;
        setTimeout(() => bbAddMsg("OK, cancelled.", false), 300);
        return;
      }
    }

    setTimeout(() => {
      // Try special queries first
      const query = bbParseQuery(raw);

      if (query) {
        if (query.type === 'query') {
          bbHandleQuery(query);
          return;
        }
        if (query.type === 'edit') {
          bbHandleEdit(query, raw);
          return;
        }
        if (query.type === 'clearDay') {
          bbHandleClearDay(query);
          return;
        }
        if (query.type === 'summary') {
          bbHandleSummary();
          return;
        }
      }

      // Check for recurring event patterns
      const isRecurring = /\b(every\s+(?:monday|tuesday|wednesday|thursday|friday|saturday|sunday)|weekly|every\s+week)\b/i.test(raw);

      // Try to parse as event
      const ev = bbParseEvent(raw);

      if (!ev) {
        bbAddMsg(bbFailMessage(raw), false);
        return;
      }

      // Smart confirmation before adding (R2-Bad-2): show confirmation then add after delay
      const dateStr = bbFriendlyDate(ev.date);
      const timeStr = ev.time ? ` at <b>${bbEsc(ev.time)}</b>` : '';
      const locStr  = ev.location ? ` at ${bbEsc(ev.location)}` : '';
      bbAddMsg(`Got it! <b>${bbEsc(ev.name)}</b> on <b>${bbEsc(dateStr)}</b>${timeStr}${locStr}. Adding now... 📅`, false);

      setTimeout(() => {
        // Handle recurring events
        if (isRecurring) {
          const series = bbGenerateRecurring(raw, ev);
          if (series) {
            series.forEach(e => bbEvents.push(e));
            bbSave();
            bbRenderEvents();
            bbRenderTodayBanner();
            bbAddMsg(`Done! Created ${series.length} recurring events. 🔁`, false);
            return;
          }
        }

        bbEvents.push(ev);
        bbSave();
        bbRenderEvents();
        bbRenderTodayBanner();
      }, 400);
    }, 380);
  }

  function bbHandleQuery(query) {
    const dateStr = bbFriendlyDate(query.date);
    const matched = bbEvents.filter(e => e.date === query.date)
      .sort((a,b) => (a.time||'') < (b.time||'') ? -1 : 1);

    if (matched.length === 0) {
      bbAddMsg(`Nothing on ${bbEsc(dateStr)}. Want to add something?`, false);
      return;
    }

    const list = matched.map(e => {
      let s = `<b>${bbEsc(e.name)}</b>`;
      if (e.time) s += ` at ${bbEsc(e.time)}`;
      return s;
    }).join(', ');

    bbAddMsg(`You have ${matched.length} thing${matched.length > 1 ? 's' : ''} on ${bbEsc(dateStr)}: ${list}.`, false);
  }

  function bbHandleEdit(query, raw) {
    const nameLower = query.eventName.toLowerCase();

    // Try to find a matching event
    const match = bbEvents.find(e => e.name.toLowerCase().includes(nameLower));
    if (!match) {
      const list = bbEvents.slice(0,5).map(e => `<b>${bbEsc(e.name)}</b>`).join(', ');
      bbAddMsg(`I couldn't find "${bbEsc(query.eventName)}" in your events. Here's what I have: ${list}${bbEvents.length > 5 ? '…' : ''}.`, false);
      return;
    }

    // Parse new date from remainder
    const dateResult = bbParseDate(query.newDateRaw.toLowerCase());
    if (!dateResult.date) {
      bbAddMsg(`I found <b>${bbEsc(match.name)}</b> but couldn't understand the new date. Try something like "move ${bbEsc(match.name)} to next Friday".`, false);
      return;
    }

    const newDateStr = dateResult.date.toISOString().slice(0,10);

    // Also parse time if present
    const timeResult = bbParseTime(query.newDateRaw.toLowerCase());

    match.date = newDateStr;
    if (timeResult.time) match.time = timeResult.time;
    bbSave();
    bbRenderEvents();
    bbRenderTodayBanner();

    const friendlyNew = bbFriendlyDate(newDateStr);
    const timeStr = match.time ? ` at ${match.time}` : '';
    bbAddMsg(`Updated <b>${bbEsc(match.name)}</b> to ${bbEsc(friendlyNew)}${bbEsc(timeStr)}. ✅`, false);
  }

  function bbHandleClearDay(query) {
    const matched = bbEvents.filter(e => e.date === query.date);
    if (matched.length === 0) {
      bbAddMsg(`No events on ${bbEsc(query.dayLabel)}. Nothing to clear.`, false);
      return;
    }

    const dateStr = bbFriendlyDate(query.date);
    bbAddMsg(`Remove ${matched.length} event${matched.length > 1 ? 's' : ''} on ${bbEsc(dateStr)}? Reply <b>yes</b> or <b>no</b>.`, false);

    bbPendingConfirm = {
      yes: () => {
        const ids = new Set(matched.map(e => e.id));
        bbEvents = bbEvents.filter(e => !ids.has(e.id));
        bbSave();
        bbRenderEvents();
        bbRenderTodayBanner();
        bbAddMsg(`Removed ${matched.length} event${matched.length > 1 ? 's' : ''} from ${bbEsc(dateStr)}.`, false);
      }
    };
  }

  function bbHandleSummary() {
    const today    = bbTodayStr();
    const now      = new Date();
    const future   = bbEvents.filter(e => e.date >= today).sort((a,b) => a.date < b.date ? -1 : 1);

    if (future.length === 0) {
      bbAddMsg("You have no upcoming events. Want to add something?", false);
      return;
    }

    // This week
    const weekEnd = new Date(now);
    weekEnd.setDate(weekEnd.getDate() + (6 - weekEnd.getDay()));
    weekEnd.setHours(23,59,59,999);
    const weekEndStr = weekEnd.toISOString().slice(0,10);

    // Next week
    const nextWeekStart = new Date(weekEnd);
    nextWeekStart.setDate(nextWeekStart.getDate() + 1);
    const nextWeekEnd = new Date(nextWeekStart);
    nextWeekEnd.setDate(nextWeekEnd.getDate() + 6);
    const nextWeekStartStr = nextWeekStart.toISOString().slice(0,10);
    const nextWeekEndStr   = nextWeekEnd.toISOString().slice(0,10);

    const thisWeekCount = future.filter(e => e.date <= weekEndStr).length;
    const nextWeekCount = future.filter(e => e.date >= nextWeekStartStr && e.date <= nextWeekEndStr).length;
    const next = future[0];

    bbAddMsg(
      `You have <b>${future.length}</b> event${future.length > 1 ? 's' : ''} coming up. ` +
      `Next is <b>${bbEsc(next.name)}</b> on ${bbEsc(bbFriendlyDateShort(next.date))}. ` +
      `This week: <b>${thisWeekCount}</b>. Next week: <b>${nextWeekCount}</b>.`,
      false
    );
  }

  function bbDeleteEvent(id) {
    bbEvents = bbEvents.filter(e => e.id !== id);
    bbSave();
    bbRenderEvents();
    bbRenderTodayBanner();
  }

  function bbEsc(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ══════════════════════════════════════════
  // EXPORT .ICS (R1-Bad-2)
  // ══════════════════════════════════════════

  function bbExportIcs() {
    if (bbEvents.length === 0) {
      bbAddMsg("No events to export yet.", false);
      return;
    }

    function icsDate(isoDate, time) {
      const d = new Date(isoDate + 'T12:00:00');
      if (time) {
        // Parse time string "7:30 PM"
        const m = time.match(/(\d+)(?::(\d+))?\s*(AM|PM)/i);
        if (m) {
          let h = parseInt(m[1], 10);
          const mins = parseInt(m[2] || '0', 10);
          const ampm = m[3].toUpperCase();
          if (ampm === 'PM' && h < 12) h += 12;
          if (ampm === 'AM' && h === 12) h = 0;
          d.setHours(h, mins, 0, 0);
          // Return local time format
          const pad = n => String(n).padStart(2,'0');
          const yr  = d.getFullYear();
          const mo  = pad(d.getMonth()+1);
          const dy  = pad(d.getDate());
          const hr  = pad(d.getHours());
          const mn  = pad(d.getMinutes());
          return `${yr}${mo}${dy}T${hr}${mn}00`;
        }
      }
      // All-day
      const pad = n => String(n).padStart(2,'0');
      return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
    }

    const vevents = bbEvents.map(ev => {
      const dtstart = icsDate(ev.date, ev.time);
      const loc = ev.location ? `LOCATION:${ev.location}\r\n` : '';
      return `BEGIN:VEVENT\r\nDTSTART:${dtstart}\r\nSUMMARY:${ev.name}\r\n${loc}END:VEVENT`;
    }).join('\r\n');

    const ics = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//BusyBoy//EN\r\n${vevents}\r\nEND:VCALENDAR`;
    const blob = new Blob([ics], { type: 'text/calendar' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'busyboy-calendar.ics';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ══════════════════════════════════════════
  // CLEAR PAST EVENTS (R1-Future-2)
  // ══════════════════════════════════════════

  function bbClearPast() {
    const today = bbTodayStr();
    const past  = bbEvents.filter(e => e.date < today);

    if (past.length === 0) {
      bbAddMsg("No past events to remove.", false);
      return;
    }

    const confirmDiv = document.getElementById('bbClearConfirm');
    confirmDiv.style.display = 'block';
    confirmDiv.innerHTML = `
      <div class="bb-inline-confirm">
        <span>Remove ${past.length} past event${past.length > 1 ? 's' : ''}?</span>
        <button class="bb-confirm-yes" onclick="bbConfirmClearPast()">Yes</button>
        <button class="bb-confirm-no" onclick="bbCancelClearPast()">No</button>
      </div>
    `;
  }

  function bbConfirmClearPast() {
    const today = bbTodayStr();
    const removed = bbEvents.filter(e => e.date < today).length;
    bbEvents = bbEvents.filter(e => e.date >= today);
    bbSave();
    bbRenderEvents();
    bbRenderTodayBanner();
    document.getElementById('bbClearConfirm').style.display = 'none';
    bbAddMsg(`Removed ${removed} past event${removed > 1 ? 's' : ''}. ✅`, false);
  }

  function bbCancelClearPast() {
    document.getElementById('bbClearConfirm').style.display = 'none';
  }

  // ══════════════════════════════════════════
  // EVENT LISTENERS
  // ══════════════════════════════════════════

  document.getElementById('bbSend').addEventListener('click', bbSend);
  document.getElementById('bbInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') bbSend();
  });

  document.getElementById('bbExportIcs').addEventListener('click', bbExportIcs);
  document.getElementById('bbClearPast').addEventListener('click', bbClearPast);

  document.getElementById('bbTogglePast').addEventListener('click', function() {
    bbShowPast = !bbShowPast;
    this.classList.toggle('bb-btn-active', bbShowPast);
    this.textContent = bbShowPast ? 'Hide Past' : 'Show Past';
    bbRenderEvents();
  });

  // ══════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════

  // Restore previous chat messages
  bbRestoreChatHistory();

  // Welcome message (only show if no prior history)
  const existingHistory = bbLoadChatHistory();
  if (existingHistory.length === 0) {
    bbAddMsg("Hey! I'm <b>BusyBoy</b>. Tell me about your upcoming events in plain English and I'll keep track of them for you. Try something like <i>\"Dinner with mum tomorrow at 7pm\"</i> or <i>\"Meeting next Monday at 9am at the office\"</i>. You can also ask <i>\"what's on Friday?\"</i> or <i>\"move dentist to next Tuesday\"</i>.", false);
  }

  bbRenderEvents();
  bbRenderTodayBanner();
  </script>
</body>
