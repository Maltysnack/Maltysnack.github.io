      overflow: hidden;
      overscroll-behavior: none;

    a { color: inherit; text-decoration: none; }

    .stage {
      position: relative;
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
    }

    .bg-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1s ease;
    }
    .bg-img.loaded { opacity: 1; animation: ken-burns 45s ease-out forwards; }

    .bg-gradient {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 20%, #f6b96f 0%, #e57a4d 30%, #7a2e4f 65%, #15131f 100%);
      opacity: 0;
      transition: opacity 1s ease;
    }
    .bg-gradient.visible { opacity: 1; animation: fade-in 1.2s ease-out forwards; }

    .overlay-1 { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.05) 30%, rgba(0,0,0,0.1) 60%, rgba(0,0,0,0.85)); pointer-events: none; }
    .overlay-2 { position: absolute; inset: 0; background: linear-gradient(to top right, rgba(0,0,0,0.4), transparent, rgba(0,0,0,0.2)); pointer-events: none; }
    .vignette { position: absolute; inset: 0; box-shadow: inset 0 0 240px rgba(0,0,0,0.55); pointer-events: none; }

    .content {
      position: relative; z-index: 10;
      height: 100%;
      display: flex; flex-direction: column;
      padding: 24px;
    }
    @media (min-width: 640px) { .content { padding: 32px 40px; } }
    @media (min-width: 768px) { .content { padding: 40px 56px; } }

    header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px;
    }
    .wordmark {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: -0.01em;
    }
    @media (min-width: 640px) { .wordmark { font-size: 26px; } }

    .wordmark-tag {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-left: 8px;
      display: none;
    }
    @media (min-width: 640px) { .wordmark-tag { display: inline; } }

    .top-actions { display: flex; align-items: center; gap: 10px; }

    .pill, .icon-btn {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.85);
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }
    .pill:hover, .icon-btn:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); }
    .pill:disabled { opacity: 0.5; cursor: wait; }

    .icon-btn {
      padding: 7px;
      width: 32px; height: 32px;
      justify-content: center;
    }

    .pill svg { transition: transform 0.4s ease; }
    .pill:hover svg { transform: rotate(90deg); }
    .pill.spinning svg { animation: spin 0.8s linear infinite; }

    .spacer { flex: 1; }

    .block { max-width: 880px; opacity: 0; transform: translateY(12px); }
    .block.in { animation: rise-in 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin-bottom: 12px;
    }

    h1.city {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      line-height: 0.95;
      letter-spacing: -0.02em;
      display: flex; flex-wrap: wrap; align-items: baseline;
      gap: 12px 20px;
    }
    h1.city .name { font-size: clamp(3rem, 11vw, 9rem); }
    h1.city .flag { font-size: clamp(2rem, 5vw, 3.5rem); }

    .country {
      margin-top: 8px;
      font-size: 14px;
      color: rgba(255,255,255,0.7);
    }
    @media (min-width: 640px) { .country { font-size: 16px; } }

    .weather-desc { font-size: 14px; color: rgba(255,255,255,0.6); font-family: 'Inter', sans-serif; }

    .beer-item { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 400; line-height: 1.5; }
    @media (min-width: 640px) { .beer-item { font-size: 18px; } }

    .beer-price { color: rgba(255,255,255,0.85); font-variant-numeric: tabular-nums; }

      margin-top: 24px;

      gap: 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.55);

    .footer-row a { text-underline-offset: 4px; }
    .footer-row a:hover { color: white; text-decoration: underline; }

    .err h2 {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 28px;
      color: rgba(255,255,255,0.9);

    .err button { margin-top: 16px; }

    .veil {
      position: absolute; inset: 0; z-index: 20;
      background: #0a0a0a;
      display: grid; place-items: center;
      gap: 16px;
      transition: opacity 0.5s ease;
    }
    .veil.hidden { opacity: 0; pointer-events: none; }
    .veil-inner { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .spinner {
      width: 40px; height: 40px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: rgba(255,255,255,1);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .veil-text {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 20px;
      color: rgba(255,255,255,0.7);
    }

    @keyframes ken-burns {
      0%   { transform: scale(1.04) translate(0, 0); }
      100% { transform: scale(1.14) translate(-1.5%, -1%); }
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes rise-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .back {

    function localHour(tz) {
      const h = new Intl.DateTimeFormat("en-GB", { timeZone: tz, hour: "2-digit", hour12: false }).format(new Date());
      return parseInt(h, 10);
    }
    function localTimeString(tz, date) {
      return new Intl.DateTimeFormat("en-GB", { timeZone: tz, hour: "2-digit", minute: "2-digit", hour12: false }).format(date || new Date());
    }
    function isHappyHour(tz) {
      const h = localHour(tz);
      return h >= HAPPY_START && h < HAPPY_END;
    }
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    function describeWeather(code, isDay) {
      const sun = isDay ? "☀️" : "🌙";
      const partly = isDay ? "⛅" : "☁️";
      switch (code) {
        case 0:  return { e: sun, d: "Clear" };
        case 1:  return { e: sun, d: "Mostly clear" };
        case 2:  return { e: partly, d: "Partly cloudy" };
        case 3:  return { e: "☁️", d: "Overcast" };
        case 45: case 48: return { e: "🌫️", d: "Foggy" };
        case 51: case 53: case 55: return { e: "🌦️", d: "Drizzle" };
        case 56: case 57: return { e: "🌨️", d: "Freezing drizzle" };
        case 61: return { e: "🌧️", d: "Light rain" };
        case 63: return { e: "🌧️", d: "Rain" };
        case 65: return { e: "🌧️", d: "Heavy rain" };
        case 66: case 67: return { e: "🌧️", d: "Freezing rain" };
        case 71: return { e: "🌨️", d: "Light snow" };
        case 73: return { e: "🌨️", d: "Snow" };
        case 75: return { e: "❄️", d: "Heavy snow" };
        case 77: return { e: "🌨️", d: "Snow grains" };
        case 80: case 81: case 82: return { e: "🌦️", d: "Showers" };
        case 85: case 86: return { e: "🌨️", d: "Snow showers" };
        case 95: return { e: "⛈️", d: "Thunderstorm" };
        case 96: case 99: return { e: "⛈️", d: "Thunderstorm with hail" };
        default: return { e: partly, d: "—" };
      }
    }
    function formatBeerPrice(price, currency) {
      try {
        return new Intl.NumberFormat(undefined, {
          style: "currency", currency,
          maximumFractionDigits: price < 10 ? 2 : 0,
        }).format(price);
      } catch {
        return price + " " + currency;
      }
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
    }

    // ────────────────────────────────────────────────────────────────
    //  FETCHERS
    // ────────────────────────────────────────────────────────────────
    async function fetchWeather(city) {
      const url = new URL("https://api.open-meteo.com/v1/forecast");
      url.searchParams.set("latitude", city.lat);
      url.searchParams.set("longitude", city.lon);
      url.searchParams.set("current", "temperature_2m,apparent_temperature,weather_code,wind_speed_10m,is_day");
      url.searchParams.set("temperature_unit", "celsius");
      url.searchParams.set("wind_speed_unit", "kmh");
      url.searchParams.set("timezone", city.tz);
      const res = await fetch(url.toString());
      if (!res.ok) throw new Error("weather");
      const data = await res.json();
      const c = data.current;
      const isDay = c.is_day === 1;
      const w = describeWeather(c.weather_code, isDay);
      return {
        tempC: Math.round(c.temperature_2m),
        feelsLikeC: Math.round(c.apparent_temperature),
        windKph: Math.round(c.wind_speed_10m),
        emoji: w.e,
        description: w.d,
        isDay,
      };
    }

    async function fetchImage(city) {
      if (!IMAGE_PROXY_URL) return null;
      try {
        const url = new URL(IMAGE_PROXY_URL);
        url.searchParams.set("city", city.name);
        url.searchParams.set("country", city.country);
        const res = await fetch(url.toString());
        if (!res.ok) return null;
        return await res.json();
      } catch {
        return null;
      }
    }

    // ────────────────────────────────────────────────────────────────
    //  RENDER
    // ────────────────────────────────────────────────────────────────
    let lastCity = null;
    let timeIntervalId = null;

    async function load(excludeName) {
      const refreshBtn = document.getElementById("refresh-btn");
      refreshBtn.classList.add("spinning");
      refreshBtn.disabled = true;

      const eligible = shuffle(CITIES.filter(c => isHappyHour(c.tz)));
      const ordered = excludeName
        ? [
            ...eligible.filter(c => c.name !== excludeName),
            ...eligible.filter(c => c.name === excludeName),
          ]
        : eligible;

      if (ordered.length === 0) {
        renderError("No cities currently in happy hour. (That shouldn't happen — try again.)");
        refreshBtn.classList.remove("spinning");
        refreshBtn.disabled = false;
        return;
      }

      for (const city of ordered) {
        try {
          const [weather, image] = await Promise.all([fetchWeather(city), fetchImage(city)]);
          // If proxy is configured but no image came back for this city, try next.
          if (IMAGE_PROXY_URL && !image) continue;
          render(city, weather, image);
          lastCity = city.name;
          break;
        } catch (e) {
          continue;
        }
      }

      refreshBtn.classList.remove("spinning");
      refreshBtn.disabled = false;
    }

    function render(city, weather, image) {
      const bgImg = document.getElementById("bg-img");
      const bgGrad = document.getElementById("bg-grad");
      bgImg.classList.remove("loaded");
      bgGrad.classList.remove("visible");

      if (image) {
        bgImg.onload = () => bgImg.classList.add("loaded");
        bgImg.src = image.url;
        bgImg.alt = image.altDescription || city.name;
      } else {
        bgGrad.classList.add("visible");
        bgImg.src = "";
      }

      const beers = BEERS[city.name + "-" + city.cc] || [];
      const beersHtml = beers.slice(0, 2).map(b =>
        `<span class="beer-item"><strong>${escapeHtml(b.n)}</strong><span class="beer-sep">·</span><span class="beer-price">${escapeHtml(formatBeerPrice(b.p, b.c))}</span></span>`
      ).join("");

      const contentArea = document.getElementById("content-area");
      contentArea.innerHTML = `
        <div class="block in" id="city-block">
          <div class="eyebrow">It's happy hour in</div>
          <h1 class="city">
            <span class="name">${escapeHtml(city.name)}</span>
            <span class="flag" aria-label="${escapeHtml(city.country)}">${city.flag}</span>
          </h1>
          <div class="country">${escapeHtml(city.country)}</div>
          <div class="stats">
            <div class="stat">
              <span class="stat-label">Local time</span>
              <span class="stat-value mono" id="local-time" data-tz="${city.tz}">${localTimeString(city.tz)}</span>
            </div>
            <div class="stat">
              <span class="stat-label">Weather</span>
              <span class="stat-value">
                <span class="weather-line">
                  <span aria-hidden="true">${weather.emoji}</span>
                  <span>${weather.tempC}°C</span>
                  <span class="weather-desc">${escapeHtml(weather.description)}</span>
                </span>
              </span>
            </div>
            ${beers.length ? `
              <div class="stat">
                <span class="stat-label">A cold one</span>
                <span class="stat-value beers">${beersHtml}</span>
              </div>
            ` : ""}
          </div>
        </div>
      `;

      const footerArea = document.getElementById("footer-area");
      footerArea.innerHTML = `
        <div class="footer-row">
          ${image
            ? `<span>Photo by <a href="${escapeHtml(image.photographerUrl)}?utm_source=happyhour&utm_medium=referral" target="_blank" rel="noreferrer">${escapeHtml(image.photographer)}</a> on <a href="https://unsplash.com/?utm_source=happyhour&utm_medium=referral" target="_blank" rel="noreferrer">Unsplash</a></span>`
            : `<span style="opacity:0.6">Photo unavailable</span>`}
          <span style="opacity:0.7">Weather by Open-Meteo</span>
        </div>
      `;

      // Restart the live-time updater
      if (timeIntervalId) clearInterval(timeIntervalId);
      timeIntervalId = setInterval(() => {
        const el = document.getElementById("local-time");
        if (el) el.textContent = localTimeString(el.dataset.tz);
      }, 30000);

      // Hide the loading veil
      document.getElementById("veil").classList.add("hidden");
    }

    function renderError(msg) {
      document.getElementById("bg-grad").classList.add("visible");
      document.getElementById("bg-img").classList.remove("loaded");
      document.getElementById("content-area").innerHTML = `
        <div class="block in err">
          <h2>${escapeHtml(msg)}</h2>
          <button class="pill" onclick="load()">Try again</button>
        </div>
      `;
      document.getElementById("footer-area").innerHTML = "";
      document.getElementById("veil").classList.add("hidden");
    }

    // ────────────────────────────────────────────────────────────────
    //  WIRE UP
    // ────────────────────────────────────────────────────────────────
    document.getElementById("refresh-btn").addEventListener("click", () => load(lastCity));
    load();
    if (AUTO_REFRESH_MS > 0) setInterval(() => load(), AUTO_REFRESH_MS);
  </script>
</body>
</html>
