      // ── Renderers: Recent results (stacked cards, group-card style) ───────────
      function renderRecent() {
        const recent = (DATA.sim.recent_matches || []);
        const container = document.getElementById('wc-recent');
        if (!container) return;
        if (!recent.length) {
          container.innerHTML = '';
          return;
        }
        container.innerHTML = '';
        const fmtDate = (s) => {
          // YYYY-MM-DD -> "May 22"
          try {
            const d = new Date(s + 'T00:00:00');
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          } catch (e) { return s; }
        };
        const tagFor = (m) => {
          const t = (m.tournament || '').toLowerCase();
          if (t === 'friendly') return 'Friendly';
          if (t.includes('world cup')) return 'World Cup';
          if (t.includes('nations league')) return 'Nations Lg';
          if (t.includes('qualif')) return 'Qualifier';
          return m.tournament || '';
        };
        // Format an Elo delta as "+4" / "−6" / "0" with sign and class.
        const fmtDelta = (v) => {
          if (v == null) return { text: '', cls: '' };
          const r = Math.round(v);
          if (r === 0) return { text: '0', cls: '' };
          const sign = r > 0 ? '+' : '−'; // proper minus sign
          const cls = r > 0 ? 'up' : 'down';
          return { text: `${sign}${Math.abs(r)}`, cls };
        };
        recent.slice(0, 12).forEach(m => {
          const card = document.createElement('div');
          card.className = 'wc-recent-card';
          card.title = `${m.home_team} vs ${m.away_team}, ${m.match_date}`;
          const exactHit =
            m.modal_score[0] === m.actual_home_goals &&
            m.modal_score[1] === m.actual_away_goals;
          const dh = fmtDelta(m.elo_delta_home);
          const da = fmtDelta(m.elo_delta_away);
          const eloRow = (m.elo_delta_home != null && m.elo_delta_away != null)
            ? `
              <div class="wc-recent-elo">
                <span class="delta ${dh.cls}">${dh.text}</span>
                <span class="center">elo</span>
                <span class="delta right ${da.cls}">${da.text}</span>
              </div>`
            : '';
          card.innerHTML = `
            <div class="meta">
              <span class="tag">${tagFor(m)}</span>
              <span>${fmtDate(m.match_date)}</span>
            </div>
            <div class="wc-recent-actual">
              <span class="team">
                ${flagImg(m.home_team)}
                <span class="name">${m.home_team}</span>
              </span>
              <span class="score">${m.actual_home_goals} &ndash; ${m.actual_away_goals}</span>
              <span class="team right">
                <span class="name">${m.away_team}</span>
                ${flagImg(m.away_team)}
              </span>
            </div>
            ${eloRow}
            <div class="wc-recent-pred${exactHit ? ' hit' : ''}">
              <span>predicted</span>
              <span class="pred-score">${m.modal_score[0]} &ndash; ${m.modal_score[1]}</span>
            </div>
          `;
          container.appendChild(card);
        });
      }

      // ── Renderers: Tournament view ───────────────────────────────
      function renderBracketInto(container, ko, withScores) {
        container.innerHTML = '';
        const rounds = [
          ['Round of 32', ko.round_of_32, false],
          ['Round of 16', ko.round_of_16, false],
          ['Quarter-finals', ko.quarter_finals, false],
          ['Semi-finals', ko.semi_finals, false],
          ['Final', ko.final, true],
        ];
        rounds.forEach(([label, matches, isFinal]) => {
          const col = document.createElement('div');
          col.className = 'wc-round' + (isFinal ? ' wc-final' : '');
          const lbl = document.createElement('div');
          lbl.className = 'wc-round-label';
          lbl.textContent = label;
          col.appendChild(lbl);
          const wrap = document.createElement('div');
          wrap.className = 'wc-round-matches';
          wrap.style.setProperty('--n', matches.length);
          matches.forEach(m => {
            const card = document.createElement('div');
            card.className = 'wc-match';
            // Show scores whenever they are present on the match.
            const showScores = m.score_a != null;
            const scoreA = showScores ? `<span class="wc-score">${m.score_a}</span>` : '';
            const scoreB = showScores ? `<span class="wc-score">${m.score_b}</span>` : '';
            // Pens: tiny "P" marker in the card's top-right corner.
            // Title attribute carries the full "winner on penalties"
            // text on hover. Absolute-positioned so it doesn't make
            // the card any taller.
            const pensMarker = m.pens
              ? `<span class="wc-pen-marker" title="${m.winner} on penalties">P</span>`
              : '';
            card.innerHTML = `
              ${pensMarker}
              <div class="wc-team ${m.winner === m.team_a ? 'winner' : ''}" title="${displayName(m.team_a)}">
                ${flagImg(m.team_a)}
                <span class="wc-team-name">${shortName(m.team_a)}</span>
                ${scoreA}
              </div>
              <div class="wc-team ${m.winner === m.team_b ? 'winner' : ''}" title="${displayName(m.team_b)}">
                ${flagImg(m.team_b)}
                <span class="wc-team-name">${shortName(m.team_b)}</span>
                ${scoreB}
              </div>
            `;
            wrap.appendChild(card);
          });
          col.appendChild(wrap);
          container.appendChild(col);
        });
      }

      function renderGroupsInto(container, groups, decimal) {
        container.innerHTML = '';
        groups.forEach(g => {
          const card = document.createElement('div');
          card.className = 'wc-group';
          const rows = g.standings.map(s => {
            const cls = s.qualifies_as === 'eliminated' ? 'eliminated' : 'advancing';
            const ptsValue = decimal
              ? (s.predicted_points != null ? s.predicted_points.toFixed(1) : s.points)
              : s.points;
            return `
              <div class="wc-group-row ${cls}">
                <span class="team-block">
                  <span class="pos">${s.position}.</span>
                  ${flagImg(s.team)}
                  <span class="team-name">${displayName(s.team)}</span>
                </span>
                <span>${ptsValue}</span>
              </div>`;
          }).join('');
          card.innerHTML = `<h4>Group ${g.name}</h4>${rows}`;
          container.appendChild(card);
        });
      }

      // Custom is "active" once any boost has a non-zero value. Adding a
      // team with boost 0 is a no-op until the user actually changes it.
      function customActive() {
        return STATE.source === 'custom' &&
               Object.values(STATE.bumps).some(v => v !== 0);
      }

      // Pick the data source to render.
      function activeDataset() {
        if (STATE.mode === 'average') {
          // Average view: show pre-built data unless the user has actually
          // applied boosts under Custom. Standings come from a single
          // representative trial that matches the predicted knockout
          // bracket, so points/GD/GF are integers and consistent with
          // the bracket below (set decimal:false to render integers).
          if (!customActive()) {
            return { knockout: DATA.bracket.knockout, groups: DATA.bracket.groups,
                     decimal: false, withScores: false };
          }
          if (!STATE.currentSim) STATE.currentSim = simulateOnce(getRatings());
          return { knockout: STATE.currentSim.knockout,
                   groups: STATE.currentSim.groups,
                   decimal: false, withScores: false };
        }
        // Single-sim view: always one rolled sample
        if (!STATE.currentSim) STATE.currentSim = simulateOnce(getRatings());
        return { knockout: STATE.currentSim.knockout,
                 groups: STATE.currentSim.groups,
                 decimal: false, withScores: true };
      }

      function renderTournamentView() {
        const root = document.getElementById('wc-tournament-view');
        const tableView = document.getElementById('wc-table-view');
        const scorersView = document.getElementById('wc-scorers-view');

        // STATE.tab is shared with the Live pane. If it's 'upcoming'
        // (Live-only), Prediction defaults to 'knockouts'.
        const predValid = ['groups', 'knockouts', 'scorers', 'table'];
        let activeTab = STATE.tab;
        if (!predValid.includes(activeTab)) activeTab = 'table';

        // Highlight Prediction's own sub-tab buttons
        document.querySelectorAll('.wc-toggle button[data-scope="prediction"]')
          .forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab));

        const isTable = activeTab === 'table';
        const isScorers = activeTab === 'scorers';
        root.hidden = isTable || isScorers;
        if (tableView) tableView.hidden = !isTable;
        if (scorersView) scorersView.hidden = !isScorers;

        if (isTable) {
          renderPaths();
          root.innerHTML = '';
          return;
        }
        if (isScorers) {
          renderScorers();
          root.innerHTML = '';
          return;
        }

        root.innerHTML = '';
        const { knockout, groups, decimal, withScores } = activeDataset();
        if (activeTab === 'knockouts') {
          const wrap = document.createElement('div');
          wrap.className = 'wc-bracket-wrap';
          const inner = document.createElement('div');
          inner.className = 'wc-bracket';
          wrap.appendChild(inner);
          root.appendChild(wrap);
          renderBracketInto(inner, knockout, withScores);
        } else {
          const groupsContainer = document.createElement('div');
          groupsContainer.className = 'wc-groups';
          groupsContainer.style.marginTop = '1rem';
          root.appendChild(groupsContainer);
          renderGroupsInto(groupsContainer, groups, decimal);
        }
      }

      // ── Renderers: paths table ──────────────────────────────────
      function activeStats() {
        if (!customActive()) return DATA.sim;
        return STATE.customAggregate || DATA.sim;
      }
      function renderPaths() {
        const sim = activeStats();
        const stats = sim.team_stats;
        // Rank by BOOSTED rating (the one the simulator actually uses,
        // after host + altitude + NT-trophy + form layers). The dark-horse
        // logic below compares this to champion% rank, using the boosted
        // rating means a team's host/altitude bonus is already priced in,
        // so the only way to surface as a dark horse is to have a tournament
        // path that lifts you beyond what your full model strength predicts.
        const byRating = [...stats].sort((a, b) => b.rating - a.rating);
        const ratingRank = new Map();
        byRating.forEach((s, i) => ratingRank.set(s.team, i + 1));

        // Dark-horse selection: a team whose champion% rank is meaningfully
        // higher than its boosted-Elo rank. We use the boosted rating (which
        // already includes host, altitude, NT-trophy and form bumps) so the
        // signal is not just "we gave them a bonus, now they outperform raw
        // Elo", it's "even after layering on every known adjustment, this
        // team's tournament path makes them punch above their strength."
        // Hosts are also explicitly excluded as belt-and-braces.
        // Cap at 2; require a minimum rank jump and a non-trivial champion%.
        const WC2026_HOSTS = new Set(['United States', 'Mexico', 'Canada']);
        const champRank = new Map();
        [...stats].sort((a, b) => b.p_champion - a.p_champion)
          .forEach((s, i) => champRank.set(s.team, i + 1));
        const darkHorseSet = new Set(
          [...stats]
            .filter(s => !WC2026_HOSTS.has(s.team))
            .filter(s => s.p_champion >= 1.0)
            .map(s => ({
              team: s.team,
              gap: ratingRank.get(s.team) - champRank.get(s.team),
              p_champion: s.p_champion,
            }))
            .filter(x => x.gap >= 1)
            .sort((a, b) => b.gap - a.gap || b.p_champion - a.p_champion)
            .slice(0, 2)
            .map(x => x.team)
        );

        const container = document.getElementById('wc-paths');
        // 10 columns: team | rating | DH | R16 | QF | SF | F | Champion | Market | Δ
        // Market column = Polymarket-implied de-vigged probability.
        // Δ column = model - market. Positive = we're more bullish.
        container.innerHTML = `
          <div class="header">Team</div>
          <div class="header"></div>
          <div class="header right">R16</div>
          <div class="header right">QF</div>
          <div class="header right">SF</div>
          <div class="header right">Final</div>
          <div class="header right">Champion</div>
        `;

        // Per-column max across all teams (not just visible top 24) so
        // the colour scale stays stable when the user filters. Floor so
        // a single tiny value doesn't max out the column.
        const probKeys = ['p_round_of_16','p_quarters','p_semis','p_final','p_champion'];
        const colMax = {};
        probKeys.forEach(k => {
          const m = Math.max(...stats.map(s => s[k] || 0));
          colMax[k] = Math.max(m, 5);
        });

        stats.forEach((s, i) => {
          const dh = darkHorseSet.has(s.team);
          // dataset.team lets the search input filter by either the
          // canonical name (e.g. "Turkey") or the display override
          // (e.g. "Türkiye"), plus the 'dark horse' tag.
          const searchKey = [
            s.team.toLowerCase(),
            displayName(s.team).toLowerCase(),
            dh ? 'dark horse' : '',
          ].filter(Boolean).join(' ');
          const meta = { 'data-team': searchKey, 'data-rank': String(i) };
          const addCell = (className, html) => {
            const c = document.createElement('div');
            c.className = 'wc-paths-row ' + className;
            for (const [k, v] of Object.entries(meta)) c.setAttribute(k, v);
            c.innerHTML = html;
            container.appendChild(c);
          };
          // 1. Team (flag + name)
          addCell('name', `${flagImg(s.team)}<span class="team-name">${displayName(s.team)}</span>`);
          // 2. Dark horse tag (always renders the cell so the column lines up)
          addCell('dh-cell', dh ? '<span class="wc-darkhorse-tag">dark horse</span>' : '');
          // 4-8. Probabilities. Square-root scale on the fill so low-but-
          // nonzero values still get visible tint instead of looking like 0.
          probKeys.forEach(k => {
            const v = s[k] || 0;
            const frac = Math.min(v / colMax[k], 1);
            const fill = Math.sqrt(frac).toFixed(3);
            addCell('cell-num',
              `<span class="v" style="--fill: ${fill}">${v.toFixed(1)}%</span>`);
          });
        });
        applyPathsFilter('');
      }
      function applyPathsFilter(query) {
        const q = query.trim().toLowerCase();
        document.querySelectorAll('#wc-paths .wc-paths-row').forEach(el => {
          const team = el.dataset.team || '';
          const rank = parseInt(el.dataset.rank || '0', 10);
          const show = q.length === 0 ? rank < N_VISIBLE_TABLE : team.includes(q);
          el.classList.toggle('wc-hidden', !show);
        });
      }

      // ── Renderers: Top scorers ───────────────────────────────────
      function renderScorers() {
        const container = document.getElementById('wc-scorers');
        if (!container) return;
        const data = DATA.scorers;
        if (!data || !data.top_20 || data.top_20.length === 0) {
          container.innerHTML =
            '<p style="color:var(--text-muted);font-size:0.85rem;">' +
            'Top-scorer prediction needs (1) WC squads to be announced and ' +
            '(2) club season stats to be scraped. Both are filling in over ' +
            'the next 2-3 weeks as more squads land.</p>';
          return;
        }
        // Filter to players whose prediction rounds to >= 1 goal, then
        // cap at 10. Below 1 is noise; below the top 10 is uninteresting
        // for a "golden boot contenders" view.
        const top = data.top_20
          .filter(p => Math.round(p.predicted_wc_goals) >= 1)
          .slice(0, 10);
        if (top.length === 0) {
          container.innerHTML =
            '<p style="color:var(--text-muted);font-size:0.85rem;">' +
            'No players currently project to 1+ goals. Coverage will ' +
            'fill out as more WC squads are announced.</p>';
          return;
        }
        const max = Math.max(...top.map(p => p.predicted_wc_goals)) || 1;
        // Country flag fallback if no club badge available.
        const clubFlagFallback = (iso) => iso
          ? `<img class="wc-flag fallback" src="https://flagcdn.com/w80/${iso}.png" alt="" loading="lazy" />`
          : '';
        container.innerHTML = top.map((p, i) => {
          const fill = Math.sqrt(p.predicted_wc_goals / max).toFixed(3);
          const rounded = Math.round(p.predicted_wc_goals);
          const exact = (p.predicted_wc_goals_raw ?? p.predicted_wc_goals).toFixed(2);
          // Prefer the actual club crest from Wikipedia; fall back to
          // the league-country flag if we don't have a badge for that club.
          const badgeHtml = p.club_badge
            ? `<img src="${p.club_badge}" alt="${p.club}" loading="lazy" title="${p.club}" />`
            : clubFlagFallback(p.club_country);
          const playerTitle = `${p.name}${p.position ? ' (' + p.position + ')' : ''}`;
          return `
            <div class="rank">${i + 1}</div>
            <div class="team-flag" title="${displayName(p.team)}">
              ${flagImg(p.team)}
            </div>
            <div class="player-name" title="${playerTitle}">${p.name}</div>
            <div class="club-badge">${badgeHtml}</div>
            <div class="predicted" style="--fill: ${fill}" title="exact projection: ${exact}">${rounded}</div>
          `;
        }).join('');
      }

      // ── Controls ─────────────────────────────────────────────────
      function renderControls() {
        document.querySelectorAll('.wc-toggle button[data-tab]').forEach(b => {
          b.classList.toggle('active', b.dataset.tab === STATE.tab);
        });
        document.querySelectorAll('.wc-toggle button[data-mode]').forEach(b => {
          b.classList.toggle('active', b.dataset.mode === STATE.mode);
        });
        document.querySelectorAll('.wc-toggle button[data-source]').forEach(b => {
          b.classList.toggle('active', b.dataset.source === STATE.source);
        });
        // New button: visible whenever there's randomness to re-sample.
        // Hidden in (Latest + Average) and (Custom + Average + no boosts).
        const rollBtn = document.getElementById('wc-roll-btn');
        const rollable = STATE.mode === 'single' ||
                         (STATE.mode === 'average' && customActive());
        rollBtn.hidden = !rollable;
        // The customise panel is only visible when Custom is selected.
        document.getElementById('wc-customise').hidden = STATE.source !== 'custom';
      }

      function renderMeta() {
        const meta = document.getElementById('wc-tournament-meta');
        const n = (DATA.sim.n_simulations || 10000).toLocaleString('en-US');
        const boostCount = Object.keys(STATE.bumps).length;
        if (!customActive()) {
          // Either Latest, or Custom with no boosts (effectively Latest)
          if (STATE.mode === 'average') {
            meta.textContent = STATE.source === 'custom'
              ? 'No boosts yet. Identical to the latest model until you apply one.'
              : `Showing average across ${n} simulations of the latest model.`;
          } else {
            meta.textContent = 'Showing one random simulation. Click New for another.';
          }
          return;
        }
        const boostNote = `${boostCount} active boost${boostCount === 1 ? '' : 's'}`;
        meta.textContent = STATE.mode === 'average'
          ? `Custom model with ${boostNote}. Averaged across ${CUSTOM_AVG_SIMS.toLocaleString('en-US')} client-side sims; click New to resample.`
          : `Custom model with ${boostNote}. One sim per New.`;
      }

      function rollSimulation() {
        STATE.currentSim = simulateOnce(getRatings());
        if (customActive() && STATE.mode === 'average') {
          recomputeCustomAggregate();
        }
        renderTournamentView();
        renderPaths();
      }

      function recomputeCustomAggregate() {
        const meta = document.getElementById('wc-tournament-meta');
        meta.innerHTML = `<span class="wc-customise-hint">Running ${CUSTOM_AVG_SIMS.toLocaleString('en-US')} simulations...</span>`;
        // Yield to the browser so the loading text actually renders
        setTimeout(() => {
          STATE.customAggregate = aggregateCustom(getRatings(), CUSTOM_AVG_SIMS);
          renderMeta();
          renderTournamentView();
          renderPaths();
        }, 30);
      }

      // Add a team to the active customise list (boost defaults to 0
      // so it's a no-op until the user types a number).
      function addCustomiseTeam(team) {
        if (!team || !SANDBOX.baseRatings.hasOwnProperty(team)) return;
        if (STATE.bumps.hasOwnProperty(team)) return; // already in list
        STATE.bumps[team] = 0;
        renderAdjustments();
      }

      // Set/update a team's boost. Live: triggers an immediate recompute.
      function setBoost(team, value) {
        STATE.bumps[team] = value;
        scheduleRecompute();
        renderControls();
        renderMeta();
      }

      function removeCustomiseTeam(team) {
        delete STATE.bumps[team];
        renderAdjustments();
        scheduleRecompute();
        renderControls();
        renderMeta();
      }

      function effectiveLabel(team, bump) {
        return Math.round((SANDBOX.baseRatings[team] || 1500) + bump);
      }

      function renderAdjustments() {
        const wrap = document.getElementById('wc-adjustments');
        wrap.innerHTML = '';
        Object.entries(STATE.bumps).forEach(([team, bump]) => {
          const pill = document.createElement('span');
          pill.className = 'wc-adjust';
          pill.innerHTML = `
            ${flagImg(team)}
            <span class="name">${team}</span>
            <span class="rating" data-team="${team}">${effectiveLabel(team, bump)}</span>
            <input class="boost" type="number" step="25" value="${bump}" data-team="${team}" />
            <span class="x" data-team="${team}" title="Remove">&times;</span>
          `;
          wrap.appendChild(pill);
        });
        // Wire input + remove handlers. The rating span next to each input
        // updates live so the user sees the effective rating they're moving.
        wrap.querySelectorAll('input.boost').forEach(el => {
          el.addEventListener('input', e => {
            const t = e.currentTarget.dataset.team;
            const v = parseFloat(e.currentTarget.value);
            const bump = isNaN(v) ? 0 : v;
            setBoost(t, bump);
            const ratingEl = e.currentTarget.parentElement.querySelector('.rating');
            if (ratingEl) ratingEl.textContent = effectiveLabel(t, bump);
          });
        });
        wrap.querySelectorAll('.x').forEach(el => {
          el.addEventListener('click', e => removeCustomiseTeam(e.currentTarget.dataset.team));
        });
      }

      // Throttle: collapse a burst of boost changes into one recompute.
      let _recomputeTimer = null;
      function scheduleRecompute() {
        if (_recomputeTimer) clearTimeout(_recomputeTimer);
        _recomputeTimer = setTimeout(() => {
          _recomputeTimer = null;
          if (customActive()) {
            // Roll a fresh single sim immediately and re-render so the
            // bracket/groups feel responsive; recompute the 2k-sim
            // aggregate after, which updates the table.
            STATE.currentSim = simulateOnce(getRatings());
            renderTournamentView();
            recomputeCustomAggregate();
          } else {
            // No customisation in effect -> fall back to Latest data
            STATE.currentSim = null;
            STATE.customAggregate = null;
            renderTournamentView();
            renderPaths();
          }
        }, 220);
      }

      // Top-level pane switching. Persists active pane in URL hash so
      // links like #tournament drop you straight onto that view.
      function showPane(name) {
        const panes = document.querySelectorAll('.wc-pane');
        const tabs = document.querySelectorAll('.wc-tab');
        let matched = false;
        panes.forEach(p => {
          const isMe = p.dataset.pane === name;
          p.hidden = !isMe;
          if (isMe) matched = true;
        });
        if (!matched) {
          panes.forEach((p, i) => p.hidden = i !== 0);
          name = panes[0]?.dataset.pane;
        }
        tabs.forEach(t => t.classList.toggle('active', t.dataset.pane === name));
        if (name && history.replaceState) {
          history.replaceState(null, '', `#${name}`);
        }
        // Refresh the now-visible pane's sub-view so its active sub-tab
        // + content matches STATE.tab.
        if (name === 'prediction') renderTournamentView();
      }
      function wireTabs() {
        document.querySelectorAll('.wc-tab').forEach(b => {
          b.addEventListener('click', () => showPane(b.dataset.pane));
        });
        // Hash is also used for sub-tab persistence (#table, #groups, etc.),
        // so we only treat it as a pane name when it literally matches a
        // pane. Otherwise leave the active pane alone; sub-tab hydration
        // handled separately in init.
        const paneNames = new Set(
          [...document.querySelectorAll('.wc-pane')].map(p => p.dataset.pane)
        );
        const initial = (location.hash || '').replace(/^#/, '');
        if (initial && paneNames.has(initial)) showPane(initial);
        window.addEventListener('hashchange', () => {
          const h = (location.hash || '').replace(/^#/, '');
          if (paneNames.has(h)) showPane(h);
        });
      }

      // ── Live / archived status badges ────────────────────────────
      // Today (pre-kickoff) the Prediction tab is a "live forecast" that
      // still updates nightly. Once we freeze the pre-kickoff snapshot
      // it becomes an "archived" forecast. Detection: if the JSON includes
      // a `frozen_at` field (added by the freeze script), treat the data
      // as archived. Otherwise we're still in forecast mode.
      const WC_KICKOFF = new Date('2026-06-11T00:00:00');
      function renderStatusBadges() {
        const today = new Date();
        const kickedOff = today >= WC_KICKOFF;
        const frozen = !!(DATA.sim && DATA.sim.frozen_at);

        const liveBadge = document.getElementById('wc-live-status');
        if (liveBadge) {
          if (kickedOff) {
            liveBadge.className = 'wc-live-status live';
            liveBadge.textContent = 'Live';
          } else {
            liveBadge.className = 'wc-live-status upcoming';
            liveBadge.textContent = 'Begins 11 June';
          }
        }
        const predBadge = document.getElementById('wc-pred-badge');
        if (predBadge) {
          if (frozen) {
            predBadge.className = 'wc-pred-badge archived';
            predBadge.textContent = 'Pre-kickoff archive';
          } else {
            // No badge before freeze. "Live forecast" is an oxymoron;
            // the Live tab covers what's actually live.
            predBadge.className = 'wc-pred-badge';
            predBadge.textContent = '';
          }
        }

        renderLiveSubview();
      }

      // ── Live sub-view dispatcher ──────────────────────────────────
      // The Live pane has 4 sub-tabs (Group stage / Knockouts / Top
      // scorers / Upcoming). STATE.tab is shared with the Prediction
      // pane so flipping top-tabs keeps the same sub-view if available.
      // If STATE.tab isn't a valid Live sub-tab (e.g., 'table'), we
      // default to 'upcoming' which is the Live-only sub-tab.
      function renderLiveSubview() {
        const liveValid = ['groups', 'knockouts', 'scorers', 'upcoming'];
        let activeTab = STATE.tab;
        if (!liveValid.includes(activeTab)) activeTab = 'upcoming';

        const views = {
          groups:    'wc-live-groups-view',
          knockouts: 'wc-live-knockouts-view',
          scorers:   'wc-live-scorers-view',
          upcoming:  'wc-live-upcoming-view',
        };
        for (const [tab, id] of Object.entries(views)) {
          const el = document.getElementById(id);
          if (el) el.hidden = tab !== activeTab;
        }
        // Highlight the active sub-tab button in Live's nav
        document.querySelectorAll('.wc-toggle button[data-scope="live"]')
          .forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab));

        // Render the active sub-view's content
        if (activeTab === 'groups')    renderLiveGroups();
        if (activeTab === 'knockouts') renderLiveKnockouts();
        if (activeTab === 'scorers')   renderLiveScorers();
        // upcoming: nothing to render here; renderNext/renderUpcoming/
        // renderLookup/renderRecent are called once at page load and
        // their content is already in the upcoming-view container.
      }

      // ── Renderer: Live tournament (legacy unified renderer; kept
      //    for callers that just want the status banner). ────────────
      function renderLiveTournament() {
        // No-op now; the sub-view renderers do the work. Status badges
        // are handled by renderStatusBadges. Leaving this as a stub so
        // old call sites don't break.
      }

      function _liveDataOrEmpty() {
        const root = document.getElementById('wc-live-groups-content');
        const live = DATA.live;
        if (!live) {
          if (root) root.innerHTML =
            '<div class="wc-live-placeholder">Live tournament data not yet generated.</div>';
          return null;
        }
        return live;
      }

      // ── Renderer: Live > Group stage (matches Prediction format) ──
      function renderLiveGroups() {
        const live = _liveDataOrEmpty();
        if (!live) return;
        const container = document.getElementById('wc-live-groups-content');
        if (!container) return;

        // Render as 12 cards using the SAME .wc-group CSS class as the
        // Prediction tab so flipping between tabs gives an apples-to-
        // apples comparison.
        const cardsHtml = live.groups.map(g => {
          const rows = g.standings.map(s => {
            const cls = s.position && s.position <= 2 ? 'advancing'
                       : (s.played > 0 ? 'eliminated' : '');
            const posStr = s.position ?? '·';
            return `
              <div class="wc-group-row ${cls}">
                <span class="team-block">
                  <span class="pos">${posStr}.</span>
                  ${flagImg(s.team)}
                  <span class="team-name">${s.team}</span>
                </span>
                <span>${s.points}</span>
              </div>`;
          }).join('');
          return `
            <div class="wc-group">
              <h4>Group ${g.name}</h4>
              ${rows}
            </div>`;
        }).join('');
        container.innerHTML = `<div class="wc-groups">${cardsHtml}</div>`;
      }

      // ── Renderer: Live > Knockouts (matches Prediction bracket format) ──
      function renderLiveKnockouts() {
        const container = document.getElementById('wc-live-knockouts-content');
        if (!container) return;
        const live = DATA.live;
        if (!live) {
          container.innerHTML =
            '<div class="wc-live-placeholder">Live tournament data not yet generated.</div>';
          return;
        }
        const status = live.tournament_status;
        if (status === 'pre' || status === 'groups') {
          const days = Math.max(0, live.days_to_kickoff || 0);
          container.innerHTML = `
            <div class="wc-live-placeholder">
              <strong>Knockout bracket is not yet set</strong>
              ${status === 'pre'
                ? `Begins after the group stage. Tournament kicks off in ${days} day${days===1?'':'s'}.`
                : `Group stage is in progress (${live.n_group_matches_played}/${live.n_group_matches_total} matches done). Bracket fills in once groups conclude.`}
              See the <a href="#prediction">Prediction</a> tab for our pre-tournament forecast bracket.
            </div>`;
          return;
        }
        // Status is 'knockouts' or 'complete': render the bracket
        // from live.knockout (pre-bucketed by live_tournament.py into
        // round_of_32 / round_of_16 / quarter_finals / semi_finals /
        // final). Reuses the same renderBracketInto used by Prediction.
        const ko = live.knockout || {
          round_of_32: [], round_of_16: [],
          quarter_finals: [], semi_finals: [], final: [],
          champion: null,
        };
        const wrap = document.createElement('div');
        wrap.className = 'wc-bracket-wrap';
        const inner = document.createElement('div');
        inner.className = 'wc-bracket';
        wrap.appendChild(inner);
        container.innerHTML = '';
        container.appendChild(wrap);
        renderBracketInto(inner, ko, true);
      }

      // ── Renderer: Live > Top scorers (actual goals when available) ──
      function renderLiveScorers() {
        const container = document.getElementById('wc-live-scorers-content');
        if (!container) return;
        const live = DATA.live;
        if (!live || live.tournament_status === 'pre') {
          container.innerHTML = `
            <div class="wc-live-placeholder">
              <strong>No goals scored yet</strong>
              Live top scorers appear here as goals go in during the
              tournament. See the <a href="#prediction">Prediction</a>
              tab for our pre-tournament golden-boot forecast.
            </div>`;
          return;
        }
        container.innerHTML = `
          <div class="wc-live-placeholder">
            Live top scorers will populate from the next data refresh.
          </div>`;
      }

      function wireControls() {
        // Sub-tab buttons appear in BOTH the Live and Prediction panes
        // (data-scope="live" or "prediction"). STATE.tab is shared so
        // clicking a sub-tab in either pane re-renders the active one.
        document.querySelectorAll('.wc-toggle button[data-tab]').forEach(b => {
          b.addEventListener('click', () => {
            STATE.tab = b.dataset.tab;
            // Persist for refresh / share-link.
            try { localStorage.setItem('worldcup.tab', STATE.tab); } catch (_) {}
            if (history.replaceState) {
              history.replaceState(null, '', `#${STATE.tab}`);
            }
            renderControls();
            // Re-render the currently-visible pane's sub-view
            const activePane = document.querySelector('.wc-pane:not([hidden])');
            if (!activePane) return;
            if (activePane.dataset.pane === 'live') {
              renderLiveSubview();
            } else {
              renderTournamentView();
            }
          });
        });
        document.querySelectorAll('.wc-toggle button[data-mode]').forEach(b => {
          b.addEventListener('click', () => {
            STATE.mode = b.dataset.mode;
            if (STATE.mode === 'single' && !STATE.currentSim) {
              STATE.currentSim = simulateOnce(getRatings());
            }
            renderControls();
            renderMeta();
            renderTournamentView();
          });
        });
        document.querySelectorAll('.wc-toggle button[data-source]').forEach(b => {
          b.addEventListener('click', () => {
            STATE.source = b.dataset.source;
            renderControls();
            renderMeta();
            // Switching source with no active boosts is a UI-only change;
            // keep using the cached Latest data. Only re-run anything when
            // there are actual customizations to apply.
            if (customActive() && STATE.mode === 'average' && !STATE.customAggregate) {
              recomputeCustomAggregate();
            }
            renderTournamentView();
            renderPaths();
          });
        });
        document.getElementById('wc-roll-btn').addEventListener('click', rollSimulation);

        // Customise: type or pick a team in the datalist input to add it
        // to the adjustment list. Boost defaults to 0; user adjusts inline.
        const addInput = document.getElementById('wc-add-team');
        const handleAdd = () => {
          const team = addInput.value.trim();
          if (SANDBOX.baseRatings.hasOwnProperty(team)) {
            // Auto-switch to Custom source so the user sees their changes
            if (STATE.source !== 'custom') {
              STATE.source = 'custom';
              renderControls();
              renderMeta();
            }
            addCustomiseTeam(team);
            addInput.value = '';
            addInput.focus();
          }
        };
        addInput.addEventListener('change', handleAdd);
        addInput.addEventListener('keydown', e => {
          if (e.key === 'Enter') handleAdd();
        });

        document.getElementById('wc-paths-search').addEventListener('input', e =>
          applyPathsFilter(e.target.value)
        );
      }

      // ── Init ─────────────────────────────────────────────────────
      // Top scorers JSON is optional; older builds won't have it. We
      // fetch it lazily and don't fail the whole page if 404.
      Promise.all([
        fetch('/projects/worldcup/bracket.json', { cache: 'no-cache' }).then(r => r.json()),
        fetch('/projects/worldcup/simulation.json', { cache: 'no-cache' }).then(r => r.json()),
        fetch('/projects/worldcup/top-scorers.json', { cache: 'no-cache' })
          .then(r => r.ok ? r.json() : null)
          .catch(() => null),
        fetch('/projects/worldcup/live.json', { cache: 'no-cache' })
          .then(r => r.ok ? r.json() : null)
          .catch(() => null),
      ])
        .then(([bracket, sim, scorers, live]) => {
          DATA.bracket = bracket;
          DATA.sim = sim;
          DATA.scorers = scorers;
          DATA.live = live;
          Object.assign(FLAGS, sim.flags || {});

          bracket.groups.forEach(g => {
            SANDBOX.groups[g.name] = g.standings.map(s => s.team);
          });
          sim.team_stats.forEach(s => {
            SANDBOX.baseRatings[s.team] = s.rating;
            RAW_RATINGS[s.team] = s.raw_rating != null ? s.raw_rating : s.rating;
          });
          SANDBOX.fixtures = (sim.match_predictions || []).map(m => ({
            home_team: m.home_team,
            away_team: m.away_team,
            neutral: m.neutral,
          }));

          document.getElementById('wc-nsims').textContent =
            (sim.n_simulations || 10000).toLocaleString('en-US');

          const datalist = document.getElementById('wc-team-list');
          const wcTeams = new Set(Object.values(SANDBOX.groups).flat());
          [...wcTeams].sort().forEach(team => {
            const opt = document.createElement('option');
            opt.value = team;
            opt.label = `${displayName(team)} (${Math.round(SANDBOX.baseRatings[team] || 1500)})`;
            datalist.appendChild(opt);
          });

          // Persist the active sub-tab across refresh + share-link. URL
          // hash wins (so `#groups` loads straight onto Groups, and is
          // shareable). localStorage is the fallback for return visits
          // where the user landed without a hash.
          const VALID_TABS = ['table', 'groups', 'knockouts', 'scorers'];
          const fromHash = (location.hash || '').replace(/^#/, '');
          if (VALID_TABS.includes(fromHash)) {
            STATE.tab = fromHash;
          } else {
            try {
              const stored = localStorage.getItem('worldcup.tab');
              if (VALID_TABS.includes(stored)) STATE.tab = stored;
            } catch (_) {}
          }

          wireControls();
          wireTabs();
          renderStatusBadges();
          // renderMatchList / renderNext / renderUpcoming / renderLookup /
          // renderRecent are all dead since the Live pane was removed;
          // their target containers (wc-next, wc-upcoming, wc-lookup,
          // wc-recent, wc-match-list) no longer exist and calling them
          // crashes init and surfaces "Tournament data not available".
          renderPaths();
          renderControls();
          renderMeta();
          renderTournamentView();
          renderLiveSubview();
        })
        .catch(err => {
          document.getElementById('wc-tournament-view').innerHTML =
            '<p style="color:var(--text-muted)">Tournament data not available.</p>';
          console.error(err);
        });
    })();
  </script>
</body>
</html>
