<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saltysnacks — maltysnack</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>

    /* ── PROJECT TAG ── */
    .project-tag {
      display: inline-block;
      font-size: 0.68rem;
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #b56a00;
      background: #fef3e2;
      padding: 3px 10px;
      border-radius: 3px;
      margin-bottom: 16px;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 0 12px;
      margin-bottom: 0;
    }

    .filter-search {
      width: 100%;
      max-width: 360px;
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--text);
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 7px 12px;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.15s ease;
    }

    .filter-search::placeholder {
      color: var(--text-dim);
    }

    .filter-search:focus {
      border-color: var(--text-muted);
    }

    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag-pill {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 4px 10px;
      cursor: pointer;
      transition: color 0.12s ease, background 0.12s ease, border-color 0.12s ease;
      user-select: none;
    }

    .tag-pill:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    .tag-pill.active {
      color: #b56a00;
      background: #fef3e2;
      border-color: #e8c080;
    }

    /* ── RECIPE LIST ── */
    #recipe-list {
      margin-top: 0;
    }

    .recipe {
      padding: 48px 0;
      border-bottom: 1px solid var(--border);
    }

    .recipe:first-of-type {
      border-top: 1px solid var(--border);
      margin-top: 36px;
    }

    /* ── RECIPE HEADER ── */
    .recipe-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .recipe-meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
    }

    .recipe-meta-time {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .recipe-meta-time + .recipe-cuisine-tag::before {
      content: '·';
      color: var(--text-dim);
      margin-right: 6px;
    }

    .recipe-cuisine-tag {
      font-size: 0.68rem;
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 2px;
    }

    .recipe-servings {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* ── RECIPE PHOTO ── */
    .recipe-photo {
      width: 100%;
      max-width: 640px;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 4px;
      display: block;
      margin-bottom: 28px;
      background: var(--sidebar-bg);
    }

    /* ── RECIPE BODY (two columns) ── */
    .recipe-body {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 36px;
      max-width: 640px;
    }

    .recipe-ingredients h3,
    .recipe-method h3 {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .recipe-ingredients ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .recipe-ingredients ul li {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.5;
      padding-left: 12px;
      position: relative;
    }

    .recipe-ingredients ul li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--text-muted);
    }

    .recipe-method ol {
      list-style: none;
      counter-reset: steps;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .recipe-method ol li {
      counter-increment: steps;
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.75;
      padding-left: 30px;
      position: relative;
    }

    .recipe-method ol li::before {
      content: counter(steps);
      position: absolute;
      left: 0;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.75rem;
      color: var(--text-muted);
      top: 3px;
    }

    /* ── NUTRITION PANEL ── */
    .nutrition-section {
      margin-top: 28px;
      max-width: 640px;
    }

    .nutrition-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      width: 100%;
      padding: 12px 0;
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: left;
      transition: color 0.12s ease;
    }

    .nutrition-toggle:hover {
      color: var(--text);
    }

    .nutrition-toggle-arrow {
      margin-left: auto;
      font-size: 0.65rem;
      transition: transform 0.2s ease;
    }

    .nutrition-toggle[aria-expanded="false"] .nutrition-toggle-arrow {
      transform: rotate(-90deg);
    }

    .nutrition-body {
      padding-bottom: 4px;
    }

    .nutrition-body[hidden] {
      display: none;
    }

    .nutrition-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .per-serving-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .per-serving-toggle input[type="checkbox"] {
      accent-color: #b56a00;
      width: 14px;
      height: 14px;
    }

    .nutrition-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    .nutrition-table th {
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: left;
      padding: 6px 8px 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .nutrition-table th:not(:first-child) {
      text-align: right;
    }

    .nutrition-table td {
      padding: 7px 8px 7px 0;
      color: var(--text);
      border-bottom: 1px solid var(--border-light);
      vertical-align: middle;
    }

    .nutrition-table td:not(:first-child) {
      text-align: right;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .nutrition-table .qty-input {
      width: 64px;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--text);
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 3px 6px;
      text-align: right;
      outline: none;
      transition: border-color 0.12s ease;
    }

    .nutrition-table .qty-input:focus {
      border-color: var(--text-muted);
    }

    .nutrition-table tr.totals-row td {
      font-weight: 400;
      color: var(--text);
      border-top: 1px solid var(--border);
      border-bottom: none;
      padding-top: 10px;
    }

    .nutrition-table tr.totals-row td:first-child {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      padding: 60px 0;
      color: var(--text-muted);
      font-size: 0.92rem;
      border-top: 1px solid var(--border);
      margin-top: 36px;
    }

    .empty-state strong {
      display: block;
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .recipe-body {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .nutrition-table th:nth-child(3),
      .nutrition-table td:nth-child(3) {
        display: none;
      }
    }

  </style>
</head>

      method: [
        "Preheat oven to 200°C. Butter 4 ramekins generously and dust with cocoa powder, tapping out the excess.",
        "Melt chocolate and butter together in a heatproof bowl over barely simmering water (or in short bursts in the microwave). Stir until smooth and glossy. Set aside to cool slightly.",
        "In a large bowl, whisk whole eggs, egg yolks, and icing sugar together vigorously until pale, thick, and slightly fluffy — about 2–3 min by hand.",
        "Pour the chocolate mixture into the egg mixture and fold gently until just combined. Sift in flour and salt and fold until no streaks remain — don't overmix.",
        "Divide batter evenly between ramekins. Bake 12 min — the edges will be set but the centre should wobble. Run a knife around the edge, place a plate on top, and invert immediately. Serve at once with ice cream."
      ],
      nutrition: [
        { name: "Dark chocolate (70%)", defaultQty: 200, calPer100: 546, proPer100: 5, carbPer100: 60, fatPer100: 31 },
        { name: "Unsalted butter", defaultQty: 120, calPer100: 717, proPer100: 1, carbPer100: 0, fatPer100: 81 },
        { name: "Eggs (whole + yolks)", defaultQty: 240, calPer100: 155, proPer100: 13, carbPer100: 1, fatPer100: 11 },
        { name: "Icing sugar", defaultQty: 120, calPer100: 390, proPer100: 0, carbPer100: 98, fatPer100: 0 },
        { name: "Plain flour", defaultQty: 60, calPer100: 364, proPer100: 10, carbPer100: 76, fatPer100: 1 }
      ]
    }
  ];

  /* ══════════════════════════════════════════════════════════
     STATE
  ══════════════════════════════════════════════════════════ */
  var activeTags = new Set();
  var searchTerm = "";

  /* ══════════════════════════════════════════════════════════
     RENDER
  ══════════════════════════════════════════════════════════ */
  function buildRecipeHTML(r) {
    // Ingredient list
    var ingHtml = r.ingredients.map(function(ing) {
      return "<li>" + escHtml(ing) + "</li>";
    }).join("");

    // Method list
    var methodHtml = r.method.map(function(step) {
      return "<li>" + escHtml(step) + "</li>";
    }).join("");

    // Cuisine pills
    var pillsHtml = r.cuisinePills.map(function(p) {
      return '<span class="recipe-cuisine-tag">' + escHtml(p) + '</span>';
    }).join(" ");

    // Nutrition table rows
    var nutRowsHtml = r.nutrition.map(function(n, i) {
      return (
        '<tr data-recipe="' + r.id + '" data-ing-idx="' + i + '">' +
        '<td>' + escHtml(n.name) + '</td>' +
        '<td><input class="qty-input" type="number" min="0" step="1" value="' + n.defaultQty + '" data-recipe="' + r.id + '" data-ing-idx="' + i + '" aria-label="Grams of ' + escHtml(n.name) + '" /></td>' +
        '<td class="nut-cal">' + calcNut(n.defaultQty, n.calPer100) + '</td>' +
        '<td class="nut-pro">' + calcNut(n.defaultQty, n.proPer100) + 'g</td>' +
        '<td class="nut-carb">' + calcNut(n.defaultQty, n.carbPer100) + 'g</td>' +
        '<td class="nut-fat">' + calcNut(n.defaultQty, n.fatPer100) + 'g</td>' +
        '</tr>'
      );
    }).join("");

    var totals = calcTotals(r, null);

    return (
      '<article class="recipe" id="recipe-' + r.id + '">' +

      '<h2 class="recipe-title">' + escHtml(r.title) + '</h2>' +

      '<div class="recipe-meta-row">' +
        '<span class="recipe-meta-time">' + escHtml(r.time) + '</span>' +
        '<span class="recipe-meta-time"> · ' + escHtml(r.servingsLabel) + '</span>' +
        ' ' + pillsHtml +
      '</div>' +

      '<img class="recipe-photo" src="' + r.photo + '" alt="' + escHtml(r.photoAlt) + '" loading="lazy" />' +

      '<div class="recipe-body">' +
        '<div class="recipe-ingredients">' +
          '<h3>Ingredients</h3>' +
          '<ul>' + ingHtml + '</ul>' +
        '</div>' +
        '<div class="recipe-method">' +
          '<h3>Method</h3>' +
          '<ol>' + methodHtml + '</ol>' +
        '</div>' +
      '</div>' +

      '<div class="nutrition-section">' +
        '<button class="nutrition-toggle" aria-expanded="true" aria-controls="nut-' + r.id + '">' +
          'Nutrition' +
          '<span class="nutrition-toggle-arrow">&#9660;</span>' +
        '</button>' +
        '<div class="nutrition-body" id="nut-' + r.id + '">' +
          '<div class="nutrition-controls">' +
            '<label class="per-serving-toggle">' +
              '<input type="checkbox" class="per-serving-cb" data-recipe="' + r.id + '" data-servings="' + r.servings + '" />' +
              'Per serving (' + r.servings + ')' +
            '</label>' +
          '</div>' +
          '<table class="nutrition-table" id="nuttable-' + r.id + '">' +
            '<thead><tr>' +
              '<th>Ingredient</th>' +
              '<th>Qty (g)</th>' +
              '<th>Cal</th>' +
              '<th>Protein</th>' +
              '<th>Carbs</th>' +
              '<th>Fat</th>' +
            '</tr></thead>' +
            '<tbody>' + nutRowsHtml + '</tbody>' +
            '<tfoot>' +
              '<tr class="totals-row">' +
                '<td>Total</td>' +
                '<td></td>' +
                '<td class="total-cal">' + totals.cal + '</td>' +
                '<td class="total-pro">' + totals.pro + 'g</td>' +
                '<td class="total-carb">' + totals.carb + 'g</td>' +
                '<td class="total-fat">' + totals.fat + 'g</td>' +
              '</tr>' +
            '</tfoot>' +
          '</table>' +
        '</div>' +
      '</div>' +

      '</article>'
    );
  }

  function calcNut(qty, per100) {
    return Math.round((qty / 100) * per100);
  }

  function calcTotals(recipe, divideBy) {
    var inputs = document.querySelectorAll('.qty-input[data-recipe="' + recipe.id + '"]');
    var cal = 0, pro = 0, carb = 0, fat = 0;

    if (inputs.length === 0) {
      // Use defaults
      recipe.nutrition.forEach(function(n) {
        cal  += calcNut(n.defaultQty, n.calPer100);
        pro  += calcNut(n.defaultQty, n.proPer100);
        carb += calcNut(n.defaultQty, n.carbPer100);
        fat  += calcNut(n.defaultQty, n.fatPer100);
      });
    } else {
      inputs.forEach(function(input, i) {
        var qty = parseFloat(input.value) || 0;
        var n = recipe.nutrition[i];
        cal  += calcNut(qty, n.calPer100);
        pro  += calcNut(qty, n.proPer100);
        carb += calcNut(qty, n.carbPer100);
        fat  += calcNut(qty, n.fatPer100);
      });
    }

    var d = divideBy || 1;
    return {
      cal:  Math.round(cal / d),
      pro:  Math.round(pro / d),
      carb: Math.round(carb / d),
      fat:  Math.round(fat / d)
    };
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function renderRecipes() {
    var list = document.getElementById("recipe-list");
    var emptyState = document.getElementById("empty-state");

    var filtered = RECIPES.filter(function(r) {
      var matchSearch = searchTerm === "" ||
        r.title.toLowerCase().indexOf(searchTerm.toLowerCase()) !== -1;

      var matchTags = activeTags.size === 0 ||
        Array.from(activeTags).some(function(t) {
          return r.tags.indexOf(t) !== -1;
        });

      return matchSearch && matchTags;
    });

    if (filtered.length === 0) {
      list.innerHTML = "";
      emptyState.hidden = false;
    } else {
      emptyState.hidden = true;
      list.innerHTML = filtered.map(buildRecipeHTML).join("");
      attachNutritionListeners();
    }
  }

  /* ══════════════════════════════════════════════════════════
     NUTRITION INTERACTIVITY
  ══════════════════════════════════════════════════════════ */
  function attachNutritionListeners() {
    // Collapsible toggles
    document.querySelectorAll(".nutrition-toggle").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var expanded = btn.getAttribute("aria-expanded") === "true";
        btn.setAttribute("aria-expanded", expanded ? "false" : "true");
        var body = document.getElementById(btn.getAttribute("aria-controls"));
        if (expanded) {
          body.hidden = true;
        } else {
          body.hidden = false;
        }
      });
    });

    // Qty inputs
    document.querySelectorAll(".qty-input").forEach(function(input) {
      input.addEventListener("input", function() {
        var recipeId = input.getAttribute("data-recipe");
        updateTotals(recipeId);
      });
    });

    // Per-serving checkboxes
    document.querySelectorAll(".per-serving-cb").forEach(function(cb) {
      cb.addEventListener("change", function() {
        var recipeId = cb.getAttribute("data-recipe");
        updateTotals(recipeId);
      });
    });
  }

  function updateTotals(recipeId) {
    var recipe = RECIPES.find(function(r) { return r.id === recipeId; });
    if (!recipe) return;

    var cb = document.querySelector('.per-serving-cb[data-recipe="' + recipeId + '"]');
    var divideBy = (cb && cb.checked) ? recipe.servings : 1;

    var totals = calcTotals(recipe, divideBy);

    var table = document.getElementById("nuttable-" + recipeId);
    if (!table) return;

    table.querySelector(".total-cal").textContent  = totals.cal;
    table.querySelector(".total-pro").textContent  = totals.pro + "g";
    table.querySelector(".total-carb").textContent = totals.carb + "g";
    table.querySelector(".total-fat").textContent  = totals.fat + "g";

    // Also update individual row display cells
    var inputs = table.querySelectorAll(".qty-input");
    inputs.forEach(function(input, i) {
      var qty = parseFloat(input.value) || 0;
      var n = recipe.nutrition[i];
      var row = input.closest("tr");
      var d = divideBy;
      row.querySelector(".nut-cal").textContent  = Math.round(calcNut(qty, n.calPer100) / d);
      row.querySelector(".nut-pro").textContent  = Math.round(calcNut(qty, n.proPer100) / d) + "g";
      row.querySelector(".nut-carb").textContent = Math.round(calcNut(qty, n.carbPer100) / d) + "g";
      row.querySelector(".nut-fat").textContent  = Math.round(calcNut(qty, n.fatPer100) / d) + "g";
    });
  }

  /* ══════════════════════════════════════════════════════════
     FILTER INTERACTIVITY
  ══════════════════════════════════════════════════════════ */
  document.getElementById("tagBar").addEventListener("click", function(e) {
    var pill = e.target.closest(".tag-pill");
    if (!pill) return;

    var tag = pill.getAttribute("data-tag");

    if (tag === "all") {
      activeTags.clear();
      document.querySelectorAll(".tag-pill").forEach(function(p) {
        p.classList.remove("active");
      });
      pill.classList.add("active");
    } else {
      // Deactivate "All" pill
      document.querySelector('.tag-pill[data-tag="all"]').classList.remove("active");

      if (activeTags.has(tag)) {
        activeTags.delete(tag);
        pill.classList.remove("active");
        // If nothing active, re-activate All
        if (activeTags.size === 0) {
          document.querySelector('.tag-pill[data-tag="all"]').classList.add("active");
        }
      } else {
        activeTags.add(tag);
        pill.classList.add("active");
      }
    }

    renderRecipes();
  });

  document.getElementById("recipeSearch").addEventListener("input", function(e) {
    searchTerm = e.target.value.trim();
    renderRecipes();
  });

  /* ══════════════════════════════════════════════════════════
     INIT
  ══════════════════════════════════════════════════════════ */
  renderRecipes();
  </script>

  <script src="/sidebar.js"></script>
</body>
</html>
