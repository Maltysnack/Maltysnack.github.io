<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FPL Predicted XI — maltysnack</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    /* ── Page layout ── */
    .fpl-wrap {
      padding: 32px 32px 80px 48px;
    }

    .fpl-header {
      margin-bottom: 24px;
    }

    .fpl-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #37003c;
      font-family: system-ui, sans-serif;
      letter-spacing: -0.02em;
    }

    .fpl-sub {
      font-size: 0.85rem;
      color: #888;
      margin-top: 4px;
      font-family: system-ui, sans-serif;
    }

    /* ── Loading / error states ── */
    .fpl-status {
      font-family: system-ui, sans-serif;
      font-size: 0.9rem;
      color: #666;
      padding: 40px 0;
      text-align: center;
    }

    .fpl-status.error { color: #c00; }

    /* ── Pitch container ── */
    .fpl-pitch-outer {
      max-width: 660px;
      margin: 0 auto;
    }

    .fpl-gw-bar {
      background: #37003c;
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 6px 6px 0 0;
    }

    .fpl-gw-pts {
      background: #00ff87;
      color: #37003c;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 100px;
    }

    /* ── Pitch ── */
    .fpl-pitch {
      position: relative;
      background: linear-gradient(
        180deg,
        #4CAF50 0%, #45a049 8%, #4CAF50 16%, #45a049 24%,
        #4CAF50 32%, #45a049 40%, #4CAF50 48%, #45a049 56%,
        #4CAF50 64%, #45a049 72%, #4CAF50 80%, #45a049 88%, #4CAF50 100%
      );
      padding: 20px 10px 28px;
      overflow: hidden;
    }

    /* Pitch markings */
    .fpl-pitch::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 1px; height: 100%;
      background: rgba(255,255,255,0.25);
    }

    .fpl-pitch-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Top penalty box */
    .fpl-box-top {
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 55%; height: 80px;
      border: 1.5px solid rgba(255,255,255,0.35);
      border-top: none;
    }

    /* Bottom penalty box */
    .fpl-box-bottom {
      position: absolute;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 55%; height: 80px;
      border: 1.5px solid rgba(255,255,255,0.35);
      border-bottom: none;
    }

    /* Halfway line */
    .fpl-halfway {
      position: absolute;
      top: 50%; left: 10%; right: 10%;
      height: 1.5px;
      background: rgba(255,255,255,0.35);
      transform: translateY(-50%);
    }

    /* Centre circle */
    .fpl-circle {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.35);
    }

    /* ── Player rows ── */
    .fpl-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 14px;
      position: relative;
      z-index: 2;
    }

    .fpl-row:last-child { margin-bottom: 0; }

    /* ── Player card ── */
    .fpl-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 78px;
      cursor: default;
      user-select: none;
    }

    .fpl-card-shirt {
      width: 58px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .fpl-card-shirt img {
      width: 54px;
      height: auto;
      display: block;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }

    /* Fallback shirt when image fails */
    .fpl-shirt-fallback {
      width: 46px;
      height: 50px;
      border-radius: 6px 6px 2px 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    .fpl-card-name {
      background: #240135;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      text-align: center;
      padding: 3px 5px;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .fpl-card-score {
      background: #190025;
      color: #00ff87;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.68rem;
      font-weight: 800;
      text-align: center;
      padding: 2px 5px;
      width: 100%;
      line-height: 1.3;
    }

    /* ── Bench ── */
    .fpl-bench-wrap {
      background: #dfe1e5;
      border-top: 3px solid #37003c;
      padding: 14px 10px 18px;
      border-radius: 0 0 6px 6px;
    }

    .fpl-bench-label {
      font-family: system-ui, sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: #37003c;
      text-align: center;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .fpl-bench-row {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .fpl-bench-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 78px;
    }

    .fpl-bench-pos {
      font-family: system-ui, sans-serif;
      font-size: 0.55rem;
      font-weight: 700;
      color: #37003c;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-align: center;
    }

    .fpl-bench-card .fpl-card-name {
      background: #37003c;
    }

    .fpl-bench-card .fpl-card-score {
      background: #240135;
    }

    /* ── Formula legend ── */
    .fpl-legend {
      max-width: 660px;
      margin: 18px auto 0;
      background: #f7f7f9;
      border: 1px solid #e0e0e8;
      border-radius: 6px;
      padding: 12px 16px;
      font-family: system-ui, sans-serif;
      font-size: 0.75rem;
      color: #555;
      line-height: 1.6;
    }

    .fpl-legend strong {
      color: #37003c;
      font-weight: 700;
    }

    .fpl-formula-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .fpl-pill {
      background: #37003c;
      color: #00ff87;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 100px;
    }
  </style>
</head>
<body>
  <script src="/sidebar.js"></script>

  <div class="fpl-wrap">
    <div class="fpl-header">
      <div class="fpl-title">FPL Predicted XI</div>
      <div class="fpl-sub">Best predicted squad for the next gameweek, built from all players.</div>
    </div>

    <div id="fplStatus" class="fpl-status">Loading player data...</div>

    <div id="fplPitchOuter" class="fpl-pitch-outer" style="display:none">

      <div class="fpl-gw-bar">
        <span id="fplGwLabel">Gameweek —</span>
        <span class="fpl-gw-pts" id="fplTotalPts">— pts</span>
      </div>

      <div class="fpl-pitch">
        <!-- Pitch markings -->
        <div class="fpl-box-top"></div>
        <div class="fpl-box-bottom"></div>
        <div class="fpl-halfway"></div>
        <div class="fpl-circle"></div>

        <!-- Player rows rendered by JS -->
        <div class="fpl-row" id="fplRowGkp"></div>
        <div class="fpl-row" id="fplRowFwd"></div>
        <div class="fpl-row" id="fplRowMid"></div>
        <div class="fpl-row" id="fplRowDef"></div>
      </div>

      <div class="fpl-bench-wrap">
        <div class="fpl-bench-label">Substitutes</div>
        <div class="fpl-bench-row" id="fplBench"></div>
      </div>

    </div>

    <div class="fpl-legend" id="fplLegend" style="display:none">
      <strong>Prediction Formula</strong>
      <div class="fpl-formula-row">
        <span class="fpl-pill">FPL ep_next &times; 0.55</span>
        <span class="fpl-pill">Form &times; 0.30</span>
        <span class="fpl-pill">Fixture difficulty modifier</span>
        <span class="fpl-pill">Home/away modifier</span>
        <span class="fpl-pill">Availability modifier</span>
      </div>
    </div>
  </div>

  <script>
  // ══════════════════════════════════════════
  // FPL PREDICTED XI
  // ══════════════════════════════════════════

  const CORS = 'https://corsproxy.io/?url=';
  const FPL  = 'https://fantasy.premierleague.com/api/';

  // Club colours for fallback shirt rendering
  const CLUB_COLOURS = {
    3:  '#EF0107', // Arsenal
    7:  '#6C1D45', // Aston Villa
    91: '#d71920', // Bournemouth
    94: '#e30613', // Brentford
    36: '#0057B8', // Brighton
    90: '#034694', // Chelsea
    31: '#1B458F', // Crystal Palace
    11: '#003399', // Everton
    54: '#003090', // Fulham
    40: '#FFD700', // Wolves
    13: '#003090', // Ipswich
    14: '#C8102E', // Liverpool
    43: '#6CABDD', // Man City
    1:  '#DA291C', // Man Utd
    4:  '#000000', // Newcastle
    17: '#D00027', // Nott'm Forest
    20: '#d71920', // Southampton
    6:  '#132257', // Spurs
    57: '#7B2C2C', // West Ham
    39: '#FDB913', // Leicester — orange/gold fallback
  };

  // Position labels for bench
  const POS_LABEL = { 1: 'GKP', 2: 'DEF', 3: 'MID', 4: 'FWD' };

  async function fetchFPL(endpoint) {
    const res = await fetch(CORS + encodeURIComponent(FPL + endpoint));
    if (!res.ok) throw new Error('API error ' + res.status);
    return res.json();
  }

  // ── Prediction formula ──
  function predictScore(player, fixtureMap) {
    const ep   = parseFloat(player.ep_next) || 0;
    const form = parseFloat(player.form)    || 0;

    // Availability modifier
    const avail = player.chance_of_playing_next_round === null
      ? 1.0
      : player.chance_of_playing_next_round / 100;

    if (avail === 0) return 0;

    // Fixture difficulty modifier
    let fdrMod = 1.0;
    const fix = fixtureMap[player.team];
    if (fix) {
      const isHome = fix.team_h === player.team;
      const fdr = isHome ? fix.team_h_difficulty : fix.team_a_difficulty;
      if      (fdr === 2) fdrMod = 1.12;
      else if (fdr === 3) fdrMod = 1.00;
      else if (fdr === 4) fdrMod = 0.87;
      else if (fdr === 5) fdrMod = 0.72;

      // Home advantage
      fdrMod *= isHome ? 1.04 : 0.97;
    }

    // Weighted prediction
    const base = (ep * 0.55) + (form * 0.30) + (player.total_points / Math.max(1, player.minutes / 90) * 0.15);
    return Math.max(0, parseFloat((base * fdrMod * avail).toFixed(2)));
  }

  // ── Squad selection ──
  function selectSquad(players) {
    const BUDGET = 1000; // £100.0m in tenths
    const MAX_PER_CLUB = 3;

    // Group by position
    const byPos = { 1: [], 2: [], 3: [], 4: [] };
    players.forEach(p => {
      if (p.predicted > 0 && p.minutes > 0) {
        byPos[p.element_type].push(p);
      }
    });

    // Sort each position by predicted score desc
    Object.values(byPos).forEach(arr => arr.sort((a, b) => b.predicted - a.predicted));

    const squad   = [];
    let remaining = BUDGET;
    const clubCount = {};

    function tryPick(pos, count) {
      let picked = 0;
      for (const p of byPos[pos]) {
        if (picked === count) break;
        if (squad.find(s => s.id === p.id)) continue;
        if (p.now_cost > remaining) continue;
        const cc = clubCount[p.team] || 0;
        if (cc >= MAX_PER_CLUB) continue;
        squad.push(p);
        remaining -= p.now_cost;
        clubCount[p.team] = cc + 1;
        picked++;
      }
    }

    // Pick minimum required per position first
    tryPick(1, 2); // 2 GKPs
    tryPick(2, 5); // 5 DEFs
    tryPick(3, 5); // 5 MIDs
    tryPick(4, 3); // 3 FWDs

    return squad;
  }

  // ── Pick starting 11 from 15 ──
  function pickStarting11(squad) {
    const gkps = squad.filter(p => p.element_type === 1).sort((a,b) => b.predicted - a.predicted);
    const outfield = squad.filter(p => p.element_type !== 1).sort((a,b) => b.predicted - a.predicted);

    const starting = [gkps[0]];
    const bench = [gkps[1]];

    // Pick best 10 outfield respecting minimums
    const defs = outfield.filter(p => p.element_type === 2);
    const mids = outfield.filter(p => p.element_type === 3);
    const fwds = outfield.filter(p => p.element_type === 4);

    const pickedOutfield = [];
    const pickedBench    = [];

    // Ensure minimums first: 3 DEF, 2 MID, 1 FWD
    [defs.slice(0,3), mids.slice(0,2), fwds.slice(0,1)].forEach(mins => {
      mins.forEach(p => pickedOutfield.push(p));
    });

    // Remaining slots (4 more) from best remaining outfield
    const remaining = outfield.filter(p => !pickedOutfield.find(x => x.id === p.id));
    remaining.slice(0, 4).forEach(p => pickedOutfield.push(p));

    // Rest go to bench
    outfield.filter(p => !pickedOutfield.find(x => x.id === p.id)).forEach(p => pickedBench.push(p));

    starting.push(...pickedOutfield.slice(0, 10));

    // Sort bench by priority: remaining DEF, then MID, then FWD
    pickedBench.sort((a,b) => {
      const order = [2,3,4];
      return order.indexOf(a.element_type) - order.indexOf(b.element_type);
    });

    bench.push(...pickedBench.slice(0, 3));

    return { starting, bench };
  }

  // ── Shirt image URL ──
  function shirtUrl(player) {
    const isGk = player.element_type === 1;
    return `https://fantasy.premierleague.com/dist/img/shirts/standard/shirt_${player.team_code}${isGk ? '_1' : ''}-66.png`;
  }

  // ── Render a player card ──
  function playerCardHTML(player) {
    const colour = CLUB_COLOURS[player.team_code] || '#37003c';
    const score  = player.predicted.toFixed(1);
    const shirt  = shirtUrl(player);

    return `<div class="fpl-card">
      <div class="fpl-card-shirt">
        <img src="${shirt}" alt="${player.web_name}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
             loading="lazy"/>
        <div class="fpl-shirt-fallback" style="background:${colour};display:none">
          ${player.element_type === 1 ? 'GK' : player.web_name.slice(0,2).toUpperCase()}
        </div>
      </div>
      <div class="fpl-card-name">${player.web_name}</div>
      <div class="fpl-card-score">${score}</div>
    </div>`;
  }

  // ── Render a bench card ──
  function benchCardHTML(player, idx) {
    const colour = CLUB_COLOURS[player.team_code] || '#37003c';
    const score  = player.predicted.toFixed(1);
    const shirt  = shirtUrl(player);
    const label  = idx === 0 ? 'GKP' : `${idx}. ${POS_LABEL[player.element_type]}`;

    return `<div class="fpl-bench-card">
      <div class="fpl-bench-pos">${label}</div>
      <div class="fpl-card-shirt">
        <img src="${shirt}" alt="${player.web_name}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
             loading="lazy"/>
        <div class="fpl-shirt-fallback" style="background:${colour};display:none">
          ${player.element_type === 1 ? 'GK' : player.web_name.slice(0,2).toUpperCase()}
        </div>
      </div>
      <div class="fpl-card-name">${player.web_name}</div>
      <div class="fpl-card-score">${score}</div>
    </div>`;
  }

  // ── Main ──
  async function init() {
    const statusEl = document.getElementById('fplStatus');

    try {
      statusEl.textContent = 'Fetching player data...';

      // Fetch bootstrap and determine next GW
      const bootstrap = await fetchFPL('bootstrap-static/');
      const elements  = bootstrap.elements;
      const events    = bootstrap.events;

      const nextGw = events.find(e => e.is_next) || events.find(e => !e.finished) || events[events.length - 1];
      const gwId   = nextGw.id;

      statusEl.textContent = `Fetching Gameweek ${gwId} fixtures...`;

      // Fetch fixtures for next GW
      const fixtures = await fetchFPL(`fixtures/?event=${gwId}`);

      // Build fixture map: team_id → fixture
      const fixtureMap = {};
      fixtures.forEach(f => {
        fixtureMap[f.team_h] = f;
        fixtureMap[f.team_a] = f;
      });

      statusEl.textContent = 'Building predicted XI...';

      // Add predictions to each player
      const scored = elements.map(p => ({
        ...p,
        predicted: predictScore(p, fixtureMap)
      }));

      // Select squad
      const squad = selectSquad(scored);

      if (squad.length < 11) {
        throw new Error('Could not build a full squad. Try refreshing.');
      }

      // Pick starting 11 and bench
      const { starting, bench } = pickStarting11(squad);

      // Group starting players by position
      const gkp  = starting.filter(p => p.element_type === 1);
      const defs = starting.filter(p => p.element_type === 2);
      const mids = starting.filter(p => p.element_type === 3);
      const fwds = starting.filter(p => p.element_type === 4);

      // Total predicted
      const total = starting.reduce((s, p) => s + p.predicted, 0);

      // Render
      document.getElementById('fplGwLabel').textContent  = `Gameweek ${gwId} — Predicted`;
      document.getElementById('fplTotalPts').textContent = total.toFixed(1) + ' pts';

      // FPL pitch is displayed GKP at bottom, FWDs at top (attacking direction upward)
      document.getElementById('fplRowGkp').innerHTML  = gkp.map(playerCardHTML).join('');
      document.getElementById('fplRowDef').innerHTML  = defs.map(playerCardHTML).join('');
      document.getElementById('fplRowMid').innerHTML  = mids.map(playerCardHTML).join('');
      document.getElementById('fplRowFwd').innerHTML  = fwds.map(playerCardHTML).join('');
      document.getElementById('fplBench').innerHTML   = bench.map((p, i) => benchCardHTML(p, i)).join('');

      // Show pitch
      statusEl.style.display = 'none';
      document.getElementById('fplPitchOuter').style.display = '';
      document.getElementById('fplLegend').style.display = '';

    } catch (err) {
      statusEl.textContent = 'Could not load FPL data. ' + err.message;
      statusEl.classList.add('error');
      console.error(err);
    }
  }

  init();
  </script>
</body>
</html>
