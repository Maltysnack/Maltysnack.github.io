<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flox Playground - maltysnack</title>
  <meta name="description" content="Flox playground: write a flow-network program and see it run live in the browser." />
  <link rel="stylesheet" href="/style.css" />
  <style>

    .pg-eyebrow {
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 14px;
    }
    .pg-eyebrow a {
      color: var(--text-dim);
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    .pg-eyebrow a:hover { color: var(--text); border-bottom-color: var(--text-dim); }
    .pg-eyebrow .sep { padding: 0 8px; opacity: 0.5; }

    .pg-meta {
      font-size: var(--text-xs);
      color: var(--text-dim);
      letter-spacing: 0.04em;
      margin-bottom: 32px;
      font-family: var(--font-mono, JetBrains Mono, monospace);
    }
    .pg-meta span + span::before { content: " / "; opacity: 0.5; padding: 0 6px; }

    .pg-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .pg-pane {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      overflow: hidden;
      background: var(--bg);
    }
    /* Editor fills most of the visible viewport. Output flows below it;
       since the table is usually too tall to fit anyway, the user
       scrolls to read it. */
    .pg-pane.pg-pane-editor { height: calc(100vh - 280px); min-height: 420px; }
    .pg-pane.pg-pane-output { min-height: 280px; }
    .pg-pane-header {
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .pg-pane-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }
    .pg-pane-header select {
      font-family: var(--font-mono, JetBrains Mono, monospace);
      font-size: var(--text-xs);
      letter-spacing: 0.06em;
      text-transform: none;
      font-weight: 500;
      background: var(--border-light);
      color: var(--text);
      border: 1px solid var(--border-light);
      border-radius: 3px;
      padding: 4px 8px;
      cursor: pointer;
    }
    .pg-pane-header select:hover { border-color: var(--text-dim); }
    .pg-pane-header select:focus { outline: 2px solid var(--accent-red); outline-offset: 1px; }
    .pg-pane-header .pg-status {
      font-family: var(--font-mono, JetBrains Mono, monospace);
      letter-spacing: 0.04em;
      text-transform: none;
      font-weight: 400;
      color: var(--text-dim);
    }
    .pg-pane-header .pg-status.pg-status-error { color: var(--accent-red); }
    .pg-pane-header .pg-status.pg-status-ok    { color: var(--text-muted); }

    #pg-editor {
      flex: 1 1 auto;
      min-height: 0;
    }

    #pg-output {
      flex: 1 1 auto;
      margin: 0;
      padding: 14px 16px;
      overflow: auto;
      font-family: var(--font-mono, JetBrains Mono, monospace);
      font-size: 0.82em;
      line-height: 1.55;
      color: var(--text);
      white-space: pre;
      tab-size: 2;
    }
    #pg-output .pg-err {
      color: var(--accent-red);
    }

    @media (max-width: 640px) {
      .pg-pane.pg-pane-editor { height: 300px; }
    }
  </style>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=3" />
  <link rel="icon" href="/favicon.ico?v=3" sizes="any" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" />
  <link rel="manifest" href="/manifest.json?v=3" />
  <meta name="theme-color" content="#13110d" />

</head>
<body>

  <aside class="sidebar"></aside>

  <main class="main" data-layout="full">

    <header class="page-header">
      <p class="pg-eyebrow"><a href="/projects/flox/">Flox</a><span class="sep">/</span>Playground</p>
      <h1 class="page-title">Playground</h1>
      <p class="pg-meta">
        <span>v0.2</span><span>auto-runs as you type</span>
      </p>
    </header>

    <div class="pg-grid">
      <div class="pg-pane pg-pane-editor">
        <div class="pg-pane-header">
          <div class="pg-pane-header-left">
            <span>Program</span>
            <select id="pg-loader" aria-label="Load example">
              <option value="" disabled selected>Load example...</option>
            </select>
          </div>
          <span class="pg-status" id="pg-status">ready</span>
        </div>
        <div id="pg-editor"></div>
      </div>
      <div class="pg-pane pg-pane-output">
        <div class="pg-pane-header">
          <span>Output</span>
        </div>
        <pre id="pg-output"></pre>
      </div>
    </div>

  </main>

  <script src="/sidebar.js"></script>

  <!-- Monaco loader (AMD) from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.50.0/min/vs/loader.js"></script>
  <script>
    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.50.0/min/vs' } });
    require(['vs/editor/editor.main'], async () => {
      const { interpret } = await import('./flox.js');

      // Flox language definition (Monarch tokenizer)
      monaco.languages.register({ id: 'flox' });
      monaco.languages.setLanguageConfiguration('flox', {
        comments: { lineComment: '//', blockComment: ['/*', '*/'] },
        brackets: [['{', '}'], ['[', ']']],
        autoClosingPairs: [
          { open: '{', close: '}' },
          { open: '[', close: ']' },
          { open: '/*', close: '*/' },
        ],
      });
      monaco.languages.setMonarchTokensProvider('flox', {
        keywords: ['system', 'river', 'dam', 'outlet', 'list', 'map', 'print', 'help', 'mode', 'start'],
        tokenizer: {
          root: [
            [/\/\/.*$/, 'comment'],
            [/\/\*/, { token: 'comment', next: '@blockcomment' }],
            [/[a-zA-Z][a-zA-Z0-9_]*/, {
              cases: { '@keywords': 'keyword', '@default': 'identifier' },
            }],
            [/\d+(\.\d+)?/, 'number'],
            [/->|<-/, 'operator'],
            [/[:;,%]/, 'delimiter'],
            [/-/, 'operator'],
            [/[{}[\]]/, '@brackets'],
            [/\s+/, 'white'],
          ],
          blockcomment: [
            [/\*\//, { token: 'comment', next: '@pop' }],
            [/[^*]+/, 'comment'],
            [/./, 'comment'],
          ],
        },
      });

      // Pick a Monaco theme that matches the site's current data-theme.
      function syncTheme() {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        monaco.editor.setTheme(isLight ? 'vs' : 'vs-dark');
      }
      // Re-sync if the user toggles the site theme.
      const obs = new MutationObserver(syncTheme);
      obs.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
      syncTheme();

      // Example programs available from the dropdown.
      // The first entry (id: "blank") is also the new-program template.
      const EXAMPLES = [
        {
          id: "blank",
          category: "blank",
          label: "Blank template",
          source: `// Flox: a small language for describing flow networks.
//
// Quick reference:
//
//   mode river;   mode markov;   mode grid;   (default: river)
//
//   system Name;                                       declare a network
//   river  Name { base: N, peak: N, decay: N }         decay optional, default 0.7
//   dam    Name { capacity: N, threshold: N%,
//                 normalRate: N, openRate: N }
//   outlet Name;                                       zero-flow accumulator
//
//   A -> B -> C;                                       connect nodes (chain)
//   A -[w]-> B                                         weighted forward arrow
//   A <- B          A <-[w]- B                         backward arrows
//
//   start NodeName 1.0;                                markov: initial mass
//
//   list  Name;                                        print connections
//   map   Name;                                        print ASCII diagram
//   print Name;                                        simulate (river: 1mm; markov: 30 ticks)
//   print Name N;                                      simulate (river: N mm; markov: N ticks)
//   print Name [r1, r2, r3, ...];                      river: per-day rainfall series

system Untitled;

// Add chains (the network shape), e.g.:
// Source -> Outlet;

// Add declarations (bare names referenced above), e.g.:
// river  Source { base: 1, peak: 1.0 }
// outlet Outlet;

// map   Untitled;
// print Untitled 5;
`,
        },
        {
          id: "demo",
          category: "river",
          label: "Demo: two sources, a confluence, an outlet",
          source: `// A small two-source demo system.
// Two upland creeks meet at a confluence and flow to an outlet.
system Demo;

// Chains: pure references, so the network shape reads at a glance.
Spring    -> Confluence -> Outlet;
Tributary -> Confluence;

/* Declarations: rich blocks, order doesn't matter.
   River params:
     base  - baseline flow (L/s) with no rainfall
     peak  - multiplier on rainfall (mm) for the peak surge
     decay - fraction of the surge retained each subsequent day */

river  Spring     { base: 2, peak: 2.0, decay: 0.7 }
river  Tributary  { base: 1, peak: 1.5, decay: 0.6 }
river  Confluence { base: 3, peak: 1.8 }
outlet Outlet;

map Demo;
print Demo 5;   // simulate at 5mm of rainfall
`,
        },
        {
          id: "devlins",
          category: "river",
          label: "Devlins: small real catchment",
          source: `// Devlins Creek catchment: two tributaries meeting Joes, then the outlet.
system Devlins;

Mahers -> Joes -> DevlinsCreek;
Bens   -> DevlinsCreek;

river Mahers { base: 2, peak: 5 }
river Joes   { base: 3, peak: 5 }
river Bens   { base: 1, peak: 1 }
outlet DevlinsCreek;

list Devlins;
map Devlins;
print Devlins;
`,
        },
        {
          id: "canberra",
          category: "river",
          label: "Canberra: three rivers, two dams",
          source: `// Canberra and surrounds: Googong, Queanbeyan, Molonglo, Burley Griffin.
system Canberra;

// Network: chains read top to bottom like a map.
Googong       -> googongDam       -> Queanbeyan -> centralMongolo;
upperMongolo  -> Queanbeyan;
jerrabombarra -> centralMongolo;
centralMongolo -> burleyGriffinDam -> lowerMongolo;

// Sources
river Googong       { base: 2, peak: 2.0, decay: 0.7 }
river upperMongolo  { base: 3, peak: 1.8, decay: 0.6 }
river jerrabombarra { base: 2, peak: 2.0 }

// Mid-network rivers
river Queanbeyan { base: 3, peak: 1.5 }

// Dams
dam googongDam       { capacity: 1000, threshold: 80%, normalRate: 0.8, openRate: 1.2 }
dam burleyGriffinDam { capacity: 5000, threshold: 60%, normalRate: 0.9, openRate: 1.5 }

// Outlets
outlet centralMongolo;
outlet lowerMongolo;

list Canberra;
map  Canberra;

print Canberra;
print Canberra 5;
print Canberra 10;
`,
        },
        {
          id: "murray",
          category: "river",
          label: "Murray-Darling: large basin",
          source: `// Murray-Darling: three major tributaries feeding the Murray, then the mouth.
system MurrayDarling;

UpperMurray  -> HumeDam       -> Murray;
Murrumbidgee -> BurrinjuckDam -> MurrumbidgeeDownstream -> Murray;
Darling      -> Murray;
Murray       -> LowerMurray   -> MurrayMouth;

river UpperMurray            { base: 5, peak: 3.0, decay: 0.8 }
river Murrumbidgee           { base: 4, peak: 2.8, decay: 0.75 }
river MurrumbidgeeDownstream { base: 3, peak: 2.0 }
river Darling                { base: 6, peak: 3.5, decay: 0.7 }
river Murray                 { base: 8, peak: 2.5 }
river LowerMurray            { base: 4, peak: 1.5 }

dam HumeDam       { capacity: 4500000, threshold: 75%, normalRate: 0.85, openRate: 1.3 }
dam BurrinjuckDam { capacity: 1026000, threshold: 70%, normalRate: 0.8,  openRate: 1.2 }

outlet MurrayMouth;

map MurrayDarling;
print MurrayDarling 5;
print MurrayDarling 15;
print MurrayDarling 30;
`,
        },
        {
          id: "thames",
          category: "river",
          label: "Thames: four headwaters into one estuary",
          source: `// Thames: four headwaters into the Upper Thames, joined by the Kennet,
// then through the Middle and Lower reaches to the estuary.
system Thames;

Churn    -> UpperThames -> MiddleThames -> LowerThames -> ThamesEstuary;
Coln     -> UpperThames;
Cherwell -> UpperThames;
Kennet   -> MiddleThames;

river Churn        { base: 2,   peak: 2.5, decay: 0.8 }
river Coln         { base: 1.5, peak: 2.0, decay: 0.75 }
river Cherwell     { base: 2.5, peak: 2.2 }
river Kennet       { base: 2,   peak: 1.8 }
river UpperThames  { base: 3,   peak: 2.0 }
river MiddleThames { base: 4,   peak: 1.8 }
river LowerThames  { base: 3,   peak: 1.5 }

outlet ThamesEstuary;

list Thames;
map Thames;
print Thames 10;
print Thames 25;
`,
        },
        {
          id: "nile",
          category: "river",
          label: "Nile: White and Blue Nile through the Aswan dam",
          source: `// The Nile: two great sources meeting at Khartoum, flowing north
// through the Aswan High Dam into the Mediterranean. The White Nile
// drains the equatorial lakes via Lake Victoria; the Blue Nile carries
// the Ethiopian highlands' summer monsoon and is the system's flashy
// pulse.
system Nile;

// White Nile: lake-fed, very steady; gathers tributaries from the
// Sudd swamps as it heads north.
LakeVictoria -> WhiteNile;
Sobat        -> WhiteNile;
BahrElGhazal -> WhiteNile;

// Confluence at Khartoum where the Blue Nile meets the White,
// then the main Nile to the Aswan dam and through Egypt.
BlueNile  -> Khartoum;
WhiteNile -> Khartoum;
Khartoum  -> Atbara -> AswanHighDam -> LowerNile -> Mediterranean;

river LakeVictoria { base: 8, peak: 1.0, decay: 0.95 }
river Sobat        { base: 3, peak: 2.0, decay: 0.7 }
river BahrElGhazal { base: 2, peak: 1.5, decay: 0.8 }
river BlueNile     { base: 6, peak: 4.0, decay: 0.5 }

river WhiteNile { base: 12, peak: 1.2, decay: 0.85 }
river Khartoum  { base: 18, peak: 2.5, decay: 0.7 }
river Atbara    { base: 18, peak: 2.5, decay: 0.7 }
river LowerNile { base: 20, peak: 1.8, decay: 0.8 }

dam AswanHighDam { capacity: 30000, threshold: 70%, normalRate: 0.85, openRate: 1.4 }

outlet Mediterranean;

map Nile;
print Nile [0, 5, 60, 40, 20, 10, 5];
`,
        },
        {
          id: "snowy",
          category: "river",
          label: "Snowy Mountains Scheme: hydroelectric diversion",
          source: `// Snowy Mountains Scheme: the Australian hydroelectric and irrigation
// project that diverts water from the Snowy River catchment inland to
// the Murray and Murrumbidgee. Multiple dams, a diversion split, and
// two outlets (one to Bass Strait via the much-reduced Snowy, one west
// to the inland irrigation network).
system SnowyMountains;

// Snowy and Eucumbene rivers feed the scheme's largest reservoir.
SnowyR     -> EucumbeneDam;
EucumbeneR -> EucumbeneDam;

// From Eucumbene the scheme splits two ways:
//  - West, through the Tumut tunnel and Blowering Dam, into the
//    Murrumbidgee (irrigation).
//  - South, into Jindabyne, where a second split sends most water
//    west into the Murray via the Murray 1 / 2 power stations and a
//    much-reduced flow continues south as the Snowy's natural outlet.
EucumbeneDam -> TumutR -> BloweringDam -> Murrumbidgee;
EucumbeneDam -> JindabyneDam;
JindabyneDam -> Murray1 -> UpperMurray;
JindabyneDam -> SnowyOutflow;

river SnowyR     { base: 4, peak: 3.0, decay: 0.6 }
river EucumbeneR { base: 2, peak: 2.0, decay: 0.7 }

river TumutR      { base: 3, peak: 2.0, decay: 0.7 }
river Murray1     { base: 2, peak: 1.0, decay: 0.8 }
river UpperMurray { base: 5, peak: 2.5, decay: 0.7 }

dam EucumbeneDam { capacity: 4800, threshold: 75%, normalRate: 0.6, openRate: 1.3 }
dam JindabyneDam { capacity: 700,  threshold: 80%, normalRate: 0.5, openRate: 1.5 }
dam BloweringDam { capacity: 1600, threshold: 70%, normalRate: 0.8, openRate: 1.3 }

outlet Murrumbidgee;
outlet SnowyOutflow;

map SnowyMountains;
print SnowyMountains [2, 5, 30, 40, 20, 10, 5, 3, 2, 1];
`,
        },
        {
          id: "passes",
          category: "markov",
          label: "Markov: pass-or-shoot decision (football)",
          source: `// PassOrShoot: a footballer in the attacking third. Each "tick" the
// player either passes again or pulls the trigger; once the shot is
// taken, league-average conversion is roughly one goal per ten shots.
//
// Numbers are calibrated to common football-analytics figures:
//   Pass-vs-shoot: ~15% of attacking-third actions become shots.
//   Shot conversion: ~10% (Opta, StatsBomb league averages).
mode markov;
system PassOrShoot;

Pass  -[0.85]-> Pass;
Pass  -[0.15]-> Shoot;

Shoot -[0.10]-> Goal;
Shoot -[0.90]-> Miss;

// Absorbing states: mass that arrives stays.
Goal -[1.0]-> Goal;
Miss -[1.0]-> Miss;

// Markov mode uses river declarations as plain "state" containers.
// The numeric attributes are unused but the declaration is required.
river Pass  { base: 0, peak: 0 }
river Shoot { base: 0, peak: 0 }
river Goal  { base: 0, peak: 0 }
river Miss  { base: 0, peak: 0 }

start Pass 1.0;

map  PassOrShoot;
print PassOrShoot 200;   // converges around tick 118
`,
        },
        {
          id: "weather",
          category: "markov",
          label: "Markov: Sydney weather (sunny / cloudy / rainy)",
          source: `// Sydney weather: a tiny three-state Markov chain. The textbook intro
// to Markov chains since the 1960s. Transitions are calibrated to
// Sydney's general pattern (BoM long-run averages: sunny days
// dominate; rainy spells persist a couple of days when they arrive).
//
// The interesting question: in the long run, what fraction of days
// are sunny / cloudy / rainy? The chain answers that as its
// stationary distribution.
mode markov;
system Sydney;

Sunny  -[0.75]-> Sunny;
Sunny  -[0.20]-> Cloudy;
Sunny  -[0.05]-> Rainy;

Cloudy -[0.35]-> Sunny;
Cloudy -[0.45]-> Cloudy;
Cloudy -[0.20]-> Rainy;

Rainy  -[0.30]-> Sunny;
Rainy  -[0.30]-> Cloudy;
Rainy  -[0.40]-> Rainy;

river Sunny  { base: 0, peak: 0 }
river Cloudy { base: 0, peak: 0 }
river Rainy  { base: 0, peak: 0 }

start Sunny 1.0;

map  Sydney;
print Sydney 200;
`,
        },
        {
          id: "powergrid",
          category: "grid",
          label: "Grid: tiny power grid (one plant, two cities, a tie line)",
          source: `// MiniGrid: a tiny power network. One generator at the centre
// supplies two cities through a hub, with a tie-line between the
// cities for redundancy. "supply" is power injected (generator, +)
// or consumed (load, -). Edge weights are conductances.
//
// In grid mode, arrow direction is ignored: every edge is
// bidirectional and flow direction is determined by the levels that
// emerge from the simulation.
//
// Total supply must balance to zero (generators = loads).
mode grid;
system MiniGrid;

Plant     -[5]-> Hub;
Hub       -[3]-> NorthCity;
Hub       -[3]-> SouthCity;
NorthCity -[1]-> SouthCity;

river Plant     { base: 0, peak: 0, supply:  100 }
river Hub       { base: 0, peak: 0 }
river NorthCity { base: 0, peak: 0, supply:  -40 }
river SouthCity { base: 0, peak: 0, supply:  -60 }

map MiniGrid;
print MiniGrid 500;
`,
        },
        {
          id: "brisbane",
          category: "river",
          label: "Brisbane: 2011-style flood through Wivenhoe Dam",
          source: `// Brisbane River with Wivenhoe Dam: the city's water supply and main
// flood defence, famously stress-tested by the 2011 floods. Three
// flashy headwater catchments converge upstream of Wivenhoe; two more
// (Lockyer Creek, Bremer River) join below it; the lower river runs
// tidal through the city to Moreton Bay.
system Brisbane;

// Upper catchment, dammed at Somerset and then Wivenhoe.
StanleyR       -> SomersetDam -> WivenhoeDam;
UpperBrisbaneR -> WivenhoeDam;

// Tributaries that join below Wivenhoe go straight into the lower
// river. They contribute to the flood peak that the dam can't see.
LockyerCk -> LowerBrisbaneR;
BremerR   -> LowerBrisbaneR;

// Wivenhoe to the bay.
WivenhoeDam -> LowerBrisbaneR -> MoretonBay;

river StanleyR        { base: 1.5, peak: 3.0, decay: 0.6 }
river UpperBrisbaneR  { base: 2,   peak: 2.5, decay: 0.65 }
river LockyerCk       { base: 1,   peak: 4.0, decay: 0.5 }
river BremerR         { base: 1,   peak: 3.0, decay: 0.6 }
river LowerBrisbaneR  { base: 5,   peak: 1.5, decay: 0.8 }

dam SomersetDam { capacity: 380,  threshold: 90%,  normalRate: 0.7, openRate: 1.5 }
dam WivenhoeDam { capacity: 1165, threshold: 100%, normalRate: 0.4, openRate: 2.0 }

outlet MoretonBay;

map Brisbane;
print Brisbane [10, 30, 80, 60, 40, 20, 10, 5];
`,
        },
        {
          id: "storm",
          category: "river",
          label: "Storm: 100mm event crosses a dam threshold",
          source: `// A 100mm storm on day 1 forces a small reservoir past its threshold.
// Outflow switches from normalRate to openRate as storage fills,
// then back to normalRate as it drains.
system Storm;

bigRain -> reservoir -> sea;

river  bigRain   { base: 5, peak: 10.0, decay: 0.5 }
dam    reservoir { capacity: 50, threshold: 80%, normalRate: 0.5, openRate: 2.0 }
outlet sea;

print Storm 100;
`,
        },
        {
          id: "series",
          category: "river",
          label: "Series: per-day rainfall pattern",
          source: `// A rainfall series: dry day, light rain, big storm, light again.
// Each non-zero day kicks off its own hydrograph; flow is the
// superposition of every event so far.
system SeriesDemo;

Spring -> Outlet;

river  Spring { base: 2, peak: 2.0, decay: 0.7 }
outlet Outlet;

print SeriesDemo [0, 1, 30, 10, 0, 0, 0];
`,
        },
      ];

      // Default landing program: the demo (named in EXAMPLES above).
      const DEFAULT_PROGRAM = EXAMPLES.find((e) => e.id === "demo").source;

      const editor = monaco.editor.create(document.getElementById('pg-editor'), {
        value: DEFAULT_PROGRAM,
        language: 'flox',
        fontFamily: 'JetBrains Mono, monospace',
        fontSize: 13,
        lineNumbers: 'on',
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        automaticLayout: true,
        renderLineHighlight: 'all',
        scrollbar: { verticalScrollbarSize: 8, horizontalScrollbarSize: 8 },
      });

      const outputEl = document.getElementById('pg-output');
      const statusEl = document.getElementById('pg-status');

      let timer = null;
      function run() {
        try {
          const result = interpret(editor.getValue());
          if (result.hadError) {
            outputEl.innerHTML = '';
            const errSpan = document.createElement('span');
            errSpan.className = 'pg-err';
            errSpan.textContent = result.stderr;
            outputEl.appendChild(errSpan);
            if (result.stdout) {
              outputEl.appendChild(document.createTextNode('\n' + result.stdout));
            }
            statusEl.textContent = 'error';
            statusEl.className = 'pg-status pg-status-error';
          } else {
            outputEl.textContent = result.stdout;
            statusEl.textContent = 'ok';
            statusEl.className = 'pg-status pg-status-ok';
          }
        } catch (e) {
          outputEl.textContent = String(e);
          statusEl.textContent = 'crash';
          statusEl.className = 'pg-status pg-status-error';
        }
      }

      editor.onDidChangeModelContent(() => {
        if (timer) clearTimeout(timer);
        timer = setTimeout(run, 200);
      });

      // Populate the loader dropdown, grouped by mode (river / markov /
      // grid). The Blank template sits at the top, ungrouped, since it
      // isn't a mode demo per se.
      const loader = document.getElementById('pg-loader');
      const groupOrder = ['blank', 'river', 'markov', 'grid'];
      const groupLabels = {
        blank: null,            // no optgroup; show inline
        river:  'River mode',
        markov: 'Markov mode',
        grid:   'Grid mode',
      };
      for (const cat of groupOrder) {
        const examples = EXAMPLES.filter((e) => e.category === cat);
        if (examples.length === 0) continue;
        const parent = groupLabels[cat]
          ? Object.assign(document.createElement('optgroup'), { label: groupLabels[cat] })
          : loader;
        for (const ex of examples) {
          const opt = document.createElement('option');
          opt.value = ex.id;
          opt.textContent = ex.label;
          parent.appendChild(opt);
        }
        if (parent !== loader) loader.appendChild(parent);
      }
      loader.addEventListener('change', (e) => {
        const id = e.target.value;
        const ex = EXAMPLES.find((x) => x.id === id);
        if (!ex) return;
        editor.setValue(ex.source);
        editor.setPosition({ lineNumber: 1, column: 1 });
        editor.revealLine(1);
        // Reset the dropdown back to its placeholder so picking the same
        // example twice in a row still works.
        loader.value = '';
      });

      run();
    });
  </script>
</body>
</html>
