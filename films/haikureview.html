<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>haikureview — maltysnack</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    /* Override default layout for this page */
    body { display: flex; flex-direction: row; }

    .haiku-page-header {
      padding: 40px 48px 0 48px;
      max-width: 900px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .haiku-page-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 400;
      margin-bottom: 6px;
    }

    .haiku-page-sub {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .spoiler-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--red);
      border: 1.5px solid var(--red-border);
      padding: 8px 16px;
      border-radius: 3px;
      background: var(--red-pale);
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .spoiler-link:hover { background: var(--red); color: #fff; border-color: var(--red); }
    .spoiler-link svg { width: 15px; height: 15px; }

    .lbxd-status {
      padding: 0 48px;
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 28px;
    }

    .lbxd-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ccc; display: inline-block;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── FILM SCROLL ── */
    .film-scroll {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Each row is full width, fixed height */
    .film-row {
      position: relative;
      width: 100%;
      height: 70vh;
      min-height: 320px;
      overflow: hidden;
      cursor: pointer;
      border-top: 1px solid var(--border);
    }

    .film-row:last-child { border-bottom: 1px solid var(--border); }

    /* Background: dark gradient default, poster when loaded */
    .film-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a1211 0%, #2a1a14 60%, #161412 100%);
      transition: opacity 0.6s ease;
    }

    .film-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      opacity: 0;
      transition: opacity 0.8s ease;
      filter: brightness(0.45) saturate(0.8);
    }

    .film-bg img.loaded { opacity: 1; }

    /* Dark vignette overlay */
    .film-vignette {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(0,0,0,0.75) 0%,
        rgba(0,0,0,0.2) 50%,
        rgba(0,0,0,0.55) 100%
      );
      pointer-events: none;
    }

    /* Content overlaid on image */
    .film-content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 0 64px;
      gap: 80px;
    }

    /* Left: number + haiku */
    .film-left {
      flex: 0 0 auto;
      max-width: 320px;
    }

    .film-num {
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 18px;
    }

    .film-haiku {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 1.15rem;
      line-height: 2;
      color: rgba(255,255,255,0.92);
      white-space: pre-line;
    }

    .film-haiku-line { display: block; }

    /* Right: reveal area */
    .film-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }

    /* Hidden title — shown on reveal */
    .film-title-reveal {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }

    .film-row.revealed .film-title-reveal {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .film-title-text {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    /* Avatar papyrus easter egg */
    .film-row[data-papyrus="true"] .film-title-text {
      font-family: Papyrus, fantasy;
    }

    .film-title-year {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
    }

    .film-title-lbxd {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .film-title-lbxd:hover { color: rgba(255,255,255,0.8); }

    /* Reveal prompt — hidden after reveal */
    .film-reveal-prompt {
      font-size: 0.72rem;
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      transition: color 0.2s, opacity 0.3s;
    }

    .film-row:hover .film-reveal-prompt { color: rgba(255,255,255,0.55); }
    .film-row.revealed .film-reveal-prompt { opacity: 0.4; }

    .film-date-badge {
      position: absolute;
      bottom: 18px;
      right: 24px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.22);
      font-family: var(--font-display);
      letter-spacing: 0.05em;
    }

    /* Score bar */
    .score-bar {
      padding: 0 48px 8px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .score-bar strong { color: var(--text); font-family: var(--font-display); }

    /* Override main padding */
    .main {
      padding: 40px 0 80px 0;
      max-width: none;
      flex: 1;
    }

    @media (max-width: 700px) {
      .haiku-page-header { padding: 28px 20px 0; }
      .lbxd-status { padding: 0 20px; }
      .score-bar { padding: 0 20px 8px; }
      .film-content { padding: 0 24px; gap: 24px; }
      .film-haiku { font-size: 1rem; }
      .film-title-text { font-size: 1.3rem; }
      .film-row { height: 60vh; }
    }
  </style>
</head>

      { date:"2024-03-21", title:"Dune",                                 year:2021, uri:"https://boxd.it/fA7G" },

      { date:"2024-03-10", title:"The Dry",                              year:2020, uri:"https://boxd.it/kOXG" },

    document.getElementById('total-count').textContent = films.length;
    let revealed = 0;

    const HAIKU = ["Lorem ipsum now", "dolor sit amet flowing", "consectetur end"];
    const posterMap = {};

    function fmtDate(d) {
      return new Date(d + 'T00:00:00').toLocaleDateString('en-AU', { month:'short', year:'numeric' });
    }

    function build() {
      const scroll = document.getElementById('film-scroll');
      films.forEach((f, i) => {
        const row = document.createElement('div');
        row.className = 'film-row';
        row.dataset.index = i;
        if (f.papyrus) row.dataset.papyrus = 'true';

        row.innerHTML = `
          <div class="film-bg">
            <img id="poster-${i}" src="" alt="" />
          </div>
          <div class="film-vignette"></div>
          <div class="film-content">
            <div class="film-left">
              <div class="film-num">#${String(i+1).padStart(2,'0')}</div>
              <div class="film-haiku">
                <span class="film-haiku-line">${HAIKU[0]}</span>
                <span class="film-haiku-line">${HAIKU[1]}</span>
                <span class="film-haiku-line">${HAIKU[2]}</span>
              </div>
            </div>
            <div class="film-right">
              <div class="film-title-reveal">
                <div class="film-title-text">${f.title}</div>
                <div class="film-title-year">${f.year}</div>
                <a class="film-title-lbxd" href="${f.uri}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ letterboxd</a>
              </div>
              <div class="film-reveal-prompt">click to reveal</div>
            </div>
          </div>
          <div class="film-date-badge">${fmtDate(f.date)}</div>
        `;

        row.addEventListener('click', () => toggle(i));
        scroll.appendChild(row);
      });
    }

    function toggle(i) {
      const row = document.querySelector(`.film-row[data-index="${i}"]`);
      const prompt = row.querySelector('.film-reveal-prompt');
      if (row.classList.contains('revealed')) {
        row.classList.remove('revealed');
        prompt.textContent = 'click to reveal';
        revealed--;
      } else {
        row.classList.add('revealed');
        prompt.textContent = 'click to hide';
        revealed++;
        // Load poster if we have one from Letterboxd RSS
        const img = document.getElementById(`poster-${i}`);
        if (posterMap[films[i].title] && !img.src) {
          img.src = posterMap[films[i].title];
          img.onload = () => img.classList.add('loaded');
        }
      }
      document.getElementById('reveal-count').textContent = revealed;
    }

    // Letterboxd RSS → poster images via CORS proxy
    async function fetchPosters() {
      const dot = document.getElementById('lbxd-dot');
      const txt = document.getElementById('lbxd-text');
      try {
        const url = 'https://api.allorigins.win/get?url=' +
          encodeURIComponent('https://letterboxd.com/maltysnack/rss/');
        const res  = await fetch(url, { signal: AbortSignal.timeout(8000) });
        const json = await res.json();
        const xml  = new DOMParser().parseFromString(json.contents, 'text/xml');
        let matched = 0;
        xml.querySelectorAll('item').forEach(item => {
          const raw = item.querySelector('title')?.textContent || '';
          // Letterboxd RSS title: "Film Name, 2024 - ★★★"
          const title = raw.replace(/,\s*\d{4}.*$/, '').trim();
          const desc = item.querySelector('description')?.textContent || '';
          const m = desc.match(/<img[^>]+src="([^"]+)"/i);
          if (m && title) { posterMap[title] = m[1]; matched++; }
        });
        dot.style.background = '#00c030';
        txt.innerHTML = `connected — ${matched} posters ready · <a href="https://letterboxd.com/maltysnack" target="_blank" style="color:inherit;text-decoration:underline;">letterboxd</a>`;
      } catch(e) {
        dot.style.background = '#c0392b';
        txt.innerHTML = `letterboxd offline · posters will load from cache · <a href="https://letterboxd.com/maltysnack" target="_blank" style="color:inherit;text-decoration:underline;">profile</a>`;
      }
    }

    build();
    fetchPosters();
  </script>
