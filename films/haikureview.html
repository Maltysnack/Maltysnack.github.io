<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>haikureview — maltysnack</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    /* Override default layout for this page */
    body { display: flex; flex-direction: row; }

    .haiku-page-header {
      padding: 40px 48px 0 48px;
      max-width: 900px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .haiku-page-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 400;
      margin-bottom: 6px;
    }

    .haiku-page-sub {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .spoiler-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--red);
      border: 1.5px solid var(--red-border);
      padding: 8px 16px;
      border-radius: 3px;
      background: var(--red-pale);
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .spoiler-link:hover { background: var(--red); color: #fff; border-color: var(--red); }
    .spoiler-link svg { width: 15px; height: 15px; }

    .lbxd-status {
      padding: 0 48px;
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
    }

    .lbxd-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ccc; display: inline-block;
      animation: lbxd-pulse 2s infinite;
    }
    @keyframes lbxd-pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .score-bar {
      padding: 0 48px 16px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .score-bar strong { color: var(--text); font-family: var(--font-display); }

    /* ── FILM GRID ── */
    .film-scroll {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 3px;
      padding: 0 48px 80px;
    }

    /* Each tile: portrait ratio, compact */
    .film-row {
      position: relative;
      aspect-ratio: 2 / 3;
      overflow: hidden;
      cursor: pointer;
      background: #1a1211;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .film-row:hover {
      transform: scale(1.025);
      box-shadow: 0 10px 32px rgba(160, 30, 20, 0.45);
      z-index: 2;
    }

    .film-row.revealed {
      box-shadow: 0 14px 42px rgba(190, 50, 20, 0.5);
      z-index: 1;
    }

    /* Warm dark backgrounds — varied per tile position when no poster */
    .film-bg {
      position: absolute;
      inset: 0;
    }
    .film-row:nth-child(3n+1) .film-bg { background: linear-gradient(150deg, #1e1210 0%, #2e1a12 55%, #160e0a 100%); }
    .film-row:nth-child(3n+2) .film-bg { background: linear-gradient(150deg, #11131a 0%, #1c1624 55%, #0e0d14 100%); }
    .film-row:nth-child(3n+3) .film-bg { background: linear-gradient(150deg, #101810 0%, #172014 55%, #0d130c 100%); }

    .film-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      opacity: 0;
      transition: opacity 0.9s ease;
      filter: brightness(0.4) saturate(0.75);
    }

    .film-row.revealed .film-bg img.loaded { opacity: 1; }

    /* Vignette overlay */
    .film-vignette {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.78) 0%,
        rgba(0,0,0,0.06) 45%,
        rgba(0,0,0,0.38) 100%
      );
      pointer-events: none;
    }

    /* Film number — top-left, warm amber */
    .film-num {
      position: absolute;
      top: 8px;
      left: 10px;
      font-family: var(--font-display);
      font-size: 0.5rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(210, 130, 50, 0.5);
      z-index: 1;
    }

    /* Review text — vertically centered in tile */
    .film-haiku-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 10px;
      z-index: 1;
    }

    .film-haiku {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.66rem;
      line-height: 1.85;
      color: rgba(255, 248, 238, 0.88);
      text-align: center;
      text-shadow: 0 1px 12px rgba(0,0,0,0.95);
    }

    .film-haiku-line { display: block; }

    /* Avatar papyrus easter egg */
    .film-row[data-papyrus="true"] .film-title-text {
      font-family: Papyrus, fantasy;
    }

    /* Reveal prompt — pulses gently, fades on reveal */
    @keyframes pulse-prompt { 0%,100%{opacity:0.2} 50%{opacity:0.5} }

    .film-reveal-prompt {
      position: absolute;
      bottom: 8px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.48rem;
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      animation: pulse-prompt 2.6s ease-in-out infinite;
      transition: color 0.2s, opacity 0.3s;
      z-index: 3;
    }

    .film-row:hover .film-reveal-prompt {
      animation: none;
      color: rgba(255, 210, 140, 0.72);
    }
    .film-row.revealed .film-reveal-prompt {
      opacity: 0;
      pointer-events: none;
      animation: none;
    }

    /* Title + links — slide up from bottom on click */
    .film-title-reveal {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 36px 10px 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.97) 0%, rgba(18,6,4,0.72) 65%, transparent 100%);
      opacity: 0;
      transform: translateY(7px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
      z-index: 2;
    }

    .film-row.revealed .film-title-reveal {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .film-title-text {
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.25;
      margin-bottom: 2px;
    }

    .film-title-year {
      font-size: 0.58rem;
      color: rgba(255,255,255,0.38);
      margin-bottom: 6px;
    }

    .film-title-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .film-title-lbxd {
      font-size: 0.58rem;
      color: rgba(210, 160, 90, 0.55);
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.15s;
    }
    .film-title-lbxd:hover { color: rgba(240, 200, 130, 0.9); }

    /* Override main padding */
    .main {
      padding: 40px 0 80px 0;
      max-width: none;
      flex: 1;
    }

    @media (max-width: 1100px) {
      .film-scroll { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 900px) {
      .film-scroll { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 700px) {
      .haiku-page-header { padding: 28px 20px 0; }
      .lbxd-status { padding: 0 20px; }
      .score-bar { padding: 0 20px 16px; }
      .film-scroll { padding: 0 12px 48px; grid-template-columns: repeat(3, 1fr); }
      .film-haiku { font-size: 0.6rem; line-height: 1.7; }
      .film-haiku-wrap { padding: 22px 8px; }
      .film-title-text { font-size: 0.64rem; }
    }

    @media (max-width: 480px) {
      .film-scroll { grid-template-columns: repeat(2, 1fr); padding: 0 4px 48px; gap: 2px; }
      .film-haiku { font-size: 0.56rem; }
      .film-title-reveal { padding: 28px 8px 10px; }
    }
  </style>
</head>
<body>

  <aside class="sidebar"></aside>

  <main class="main">

    <div class="haiku-page-header">
      <div>
        <h1 class="haiku-page-title">haikureview</h1>
        <p class="haiku-page-sub">one haiku. one film. tap or click to reveal.</p>
      </div>
      <a href="/films/SPOILERALERT.html" class="spoiler-link" title="Full reviews with spoilers">
        ⚠
      </a>
    </div>

    <div class="lbxd-status">
      <span class="lbxd-dot" id="lbxd-dot"></span>
      <span id="lbxd-text">connecting to <a href="https://letterboxd.com/maltysnack" target="_blank" style="color:inherit;text-decoration:underline;">letterboxd</a>…</span>
    </div>

    <div class="score-bar">
      Revealed: <strong id="reveal-count">0</strong> / <strong id="total-count">0</strong>
    </div>

    <div class="film-scroll" id="film-scroll"></div>

  </main>

  <script src="/sidebar.js"></script>
  <script>
    const LBXD_USER = 'maltysnack';
    let revealed = 0;

    function buildRow(film, i) {
      const row = document.createElement('div');
      row.className = 'film-row';
      row.id = `film-${i}`;
      row.dataset.index = i;
      row.dataset.poster = film.poster || '';
      if (/avatar/i.test(film.title)) row.dataset.papyrus = 'true';

      const haikuHtml = film.lines.length
        ? film.lines.map(l => `<span class="film-haiku-line">${l}</span>`).join('')
        : `<span class="film-haiku-line" style="opacity:0.28;font-style:italic;">no review yet</span>`;

      row.innerHTML = `
        <div class="film-bg"><img src="" alt="" /></div>
        <div class="film-vignette"></div>
        <div class="film-num">#${String(i+1).padStart(2,'0')}</div>
        <div class="film-haiku-wrap">
          <div class="film-haiku">${haikuHtml}</div>
        </div>
        <div class="film-reveal-prompt">click to reveal</div>
        <div class="film-title-reveal">
          <div class="film-title-text">${film.title}</div>
          <div class="film-title-year">${film.year}</div>
          <div class="film-title-links">
            <a class="film-title-lbxd" href="${film.uri}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="View on Letterboxd"><svg width="16" height="16" viewBox="0 0 500 500" fill="currentColor" style="vertical-align:middle;"><circle cx="250" cy="250" r="250"/><ellipse cx="180" cy="250" rx="90" ry="130" fill="none" stroke="#fff" stroke-width="30"/><ellipse cx="320" cy="250" rx="90" ry="130" fill="none" stroke="#fff" stroke-width="30"/></svg></a>
            <a class="film-title-lbxd" href="/films/SPOILERALERT.html#film-${i}" onclick="event.stopPropagation()" title="Read full review" style="font-size:14px;">⚠</a>
          </div>
        </div>
      `;

      row.addEventListener('click', () => toggle(i));
      return row;
    }

    function toggle(i) {
      const row = document.querySelector(`.film-row[data-index="${i}"]`);
      const prompt = row.querySelector('.film-reveal-prompt');
      if (row.classList.contains('revealed')) {
        row.classList.remove('revealed');
        prompt.textContent = 'click to reveal';
        revealed--;
      } else {
        row.classList.add('revealed');
        prompt.textContent = 'click to hide';
        revealed++;
        const img = row.querySelector('.film-bg img');
        if (row.dataset.poster && !img.getAttribute('src')) {
          img.src = row.dataset.poster;
          img.onload = () => img.classList.add('loaded');
        }
      }
      document.getElementById('reveal-count').textContent = revealed;
    }

    // ── RSS helpers (browser-side) ──────────────────────────────────────

    function rssTag(xml, tag) {
      const re = new RegExp(`<${tag}[^>]*>(?:<!\\[CDATA\\[([\\s\\S]*?)\\]\\]>|([\\s\\S]*?))<\\/${tag}>`, 'i');
      const m = re.exec(xml);
      return m ? (m[1] !== undefined ? m[1] : (m[2] || '')).trim() : '';
    }

    function rssPoster(desc) {
      const m = /<img[^>]+src="([^"]+)"/i.exec(desc);
      return m ? m[1] : '';
    }

    function rssHaiku(desc) {
      const text = desc
        .replace(/<p[^>]*>\s*<img[^>]*>\s*<\/p>/gi, '')
        .replace(/<p[^>]*>[★½\s]*<\/p>/gi, '')
        .replace(/<\/p>/gi, '\n').replace(/<p[^>]*>/gi, '')
        .replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '')
        .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').trim();
      return text.split('\n').map(l => l.trim()).filter(Boolean);
    }

    async function mergeWithRSS(films) {
      const rssUrl = `https://letterboxd.com/${LBXD_USER}/rss/`;
      const proxies = [
        url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
        url => `https://corsproxy.io/?${encodeURIComponent(url)}`
      ];

      let xmlText = null;
      for (const makeUrl of proxies) {
        try {
          const ctrl  = new AbortController();
          const timer = setTimeout(() => ctrl.abort(), 7000);
          const res   = await fetch(makeUrl(rssUrl), { signal: ctrl.signal });
          clearTimeout(timer);
          if (!res.ok) continue;
          const raw = await res.text();
          let data;
          try { data = JSON.parse(raw); xmlText = data.contents; }
          catch(e) { xmlText = raw; }
          if (xmlText && xmlText.includes('<item>')) break;
        } catch(e) { continue; }
      }

      if (!xmlText) return films;

      // Build lookup: "title_lower|year" → array index
      const filmMap = new Map();
      films.forEach((f, i) => filmMap.set(`${f.title.toLowerCase()}|${f.year}`, i));

      // Clone films array so we can patch it
      films = films.map(f => ({ ...f }));

      const itemRe  = /<item>([\s\S]*?)<\/item>/g;
      const newItems = [];
      let m;

      while ((m = itemRe.exec(xmlText)) !== null) {
        const raw   = m[1];
        const title = rssTag(raw, 'letterboxd:filmTitle') ||
                      rssTag(raw, 'title').replace(/,\s*\d{4}.*$/, '').trim();
        const year  = parseInt(rssTag(raw, 'letterboxd:filmYear')) || 0;
        const desc  = rssTag(raw, 'description');
        const poster = rssPoster(desc);
        const key   = `${title.toLowerCase()}|${year}`;

        if (filmMap.has(key)) {
          // Patch poster URL onto existing entry if currently empty
          const idx = filmMap.get(key);
          if (poster && !films[idx].poster) films[idx].poster = poster;
        } else {
          // New entry not yet in films.json
          const date = rssTag(raw, 'letterboxd:watchedDate');
          const uriM = /<link>([^<]+)<\/link>/i.exec(raw);
          const uri  = uriM ? uriM[1].trim() : rssTag(raw, 'guid');
          const haiku = rssHaiku(desc);
          newItems.push({ title, year, date, uri, poster, haiku, review: '' });
        }
      }

      // newItems is in RSS order (newest-first), prepend to keep newest-first overall
      return newItems.length > 0 ? [...newItems, ...films] : films;
    }

    // ───────────────────────────────────────────────────────────────────

    async function loadFilms() {
      const dot    = document.getElementById('lbxd-dot');
      const txt    = document.getElementById('lbxd-text');
      const scroll = document.getElementById('film-scroll');

      let films;
      try {
        const res = await fetch('/films.json');
        films = await res.json();
      } catch(e) {
        dot.style.background = '#c0392b';
        txt.textContent = 'could not load film data';
        return;
      }

      // Merge with live RSS: patches poster URLs + picks up new diary entries
      try { films = await mergeWithRSS(films); } catch(e) { /* silent fail */ }

      // Sort newest-first by watched date (fixes ordering when RSS adds new entries)
      films.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

      document.getElementById('total-count').textContent = films.length;
      films.forEach((film, i) => {
        scroll.appendChild(buildRow({ ...film, lines: (film.haiku || []).filter(l => !/^Watched on /i.test(l)) }, i));
      });

      dot.style.background = '#00c030';
      txt.innerHTML = `${films.length} entries · <a href="https://letterboxd.com/${LBXD_USER}" target="_blank" style="color:inherit;text-decoration:underline;">letterboxd</a>`;

      // Scroll to anchor if navigated here from another page
      if (location.hash) {
        const el = document.querySelector(location.hash);
        if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
      }
    }

    loadFilms();
  </script>
</body>
</html>
