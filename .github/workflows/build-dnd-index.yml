name: Build dnd index

on:
  push:
    branches: [main]
    paths:
      - 'dnd/characters/*.json'
      - '!dnd/characters/index.json'
      - '!dnd/characters/README.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dnd index + shims
        run: node dnd/scripts/build-dnd-index.js

      - name: Commit + push if changed
        run: |
          git config user.name  "maltysnack"
          git config user.email "39046911+Maltysnack@users.noreply.github.com"
          git add dnd/characters/index.json
          git add 'dnd/*.html' || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          MSG=$'build(dnd): rebuild index after merge [skip ci]\n\nCo-Authored-By: Wren <wren@maltysnack.dev>'
          git commit -m "$MSG"
          # Race-safe push: if another action advanced main while we ran,
          # rebase + retry up to 3 times. The build script is deterministic
          # so re-running on top of the new HEAD produces the same result.
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $i). Pulling + rebuilding..."
            git pull --rebase origin main
            node dnd/scripts/build-dnd-index.js
            git add dnd/characters/index.json 'dnd/*.html' 2>/dev/null || true
            git diff --staged --quiet && exit 0
            git commit --amend --no-edit
          done
          echo "Push still rejected after 3 retries."
          exit 1
