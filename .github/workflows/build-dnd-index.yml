name: Build dnd index

on:
  push:
    branches: [main]
    paths:
      - 'dnd/characters/*.json'
      - '!dnd/characters/index.json'
      - '!dnd/characters/README.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dnd index + shims
        run: node scripts/build-dnd-index.js

      - name: Commit + push if changed
        run: |
          git config user.name  "maltysnack"
          git config user.email "39046911+Maltysnack@users.noreply.github.com"
          git add dnd/characters/index.json
          git add 'dnd/*.html' || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          MSG=$'build(dnd): rebuild index after merge [skip ci]\n\nCo-Authored-By: Wren <wren@maltysnack.dev>'
          git commit -m "$MSG"
          git push
