name: Update Magic dataset

on:
  schedule:
    - cron: '0 12 * * 2'   # Tuesdays 12:00 UTC, magic.gg posts Mondays, we run a day later
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps (cluster.py needs sklearn + numpy)
        run: pip install numpy scikit-learn

      - name: Scrape latest decklists
        run: python3 games/magic/data/scrape.py

      - name: Enrich new cards from Scryfall (incremental)
        run: python3 games/magic/data/enrich.py

      # Analyze runs after enrich so it can use scryfall data for land detection
      - name: Recompute card stats
        run: python3 games/magic/data/analyze.py

      - name: Recompute archetype clusters (NMF)
        run: python3 games/magic/data/cluster.py

      # Emits story_candidates.json for the curator. Does not touch stories.json.
      - name: Detect story candidates
        run: python3 games/magic/data/detect_stories.py

      - name: Commit and push if changed
        run: |
          git config user.name  "maltysnack"
          git config user.email "39046911+Maltysnack@users.noreply.github.com"
          git add games/magic/data/decks_raw.json games/magic/data/cards.json games/magic/data/pairs.json games/magic/data/explore.json games/magic/data/meta.json games/magic/data/scryfall.json games/magic/data/clusters.json games/magic/data/story_candidates.json
          git diff --staged --quiet || git commit -m "magic: weekly dataset refresh"
          git push
