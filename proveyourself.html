<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>proveyourself — maltysnack</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    .quiz-block {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      max-width: 620px;
      margin-top: 36px;
    }

    .quiz-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .quiz-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .quiz-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .quiz-progress {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
      font-family: var(--font-display);
      font-weight: 600;
    }

    .quiz-progress-bar-wrap {
      height: 3px;
      background: var(--border);
    }

    .quiz-progress-bar {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s ease;
      width: 0%;
    }

    .quiz-body {
      padding: 28px 28px 24px;
    }

    .question-text {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.45;
      margin-bottom: 22px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      text-align: left;
      padding: 12px 18px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--bg);
      font-family: var(--font-body);
      font-size: 0.92rem;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      line-height: 1.4;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: #fff;
    }

    .option-btn.correct {
      border-color: #2a7a3e;
      background: #eaf5ec;
      color: #2a7a3e;
    }

    .option-btn.wrong {
      border-color: var(--red-border);
      background: var(--red-pale);
      color: var(--red);
    }

    .option-btn:disabled { cursor: default; }

    .feedback {
      margin-top: 18px;
      font-size: 0.88rem;
      line-height: 1.65;
      min-height: 48px;
      color: var(--text-muted);
      font-style: italic;
    }

    .quiz-footer {
      padding: 16px 28px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .next-btn {
      font-family: var(--font-display);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #fff;
      background: var(--accent);
      border: none;
      padding: 9px 22px;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.15s;
      display: none;
    }

    .next-btn:hover { background: var(--accent-hover); }
    .next-btn.visible { display: inline-block; }

    /* Results screen */
    .results {
      padding: 40px 28px;
      text-align: center;
      display: none;
    }

    .results.visible { display: block; }

    .results-score {
      font-family: var(--font-display);
      font-size: 3.5rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
      margin-bottom: 8px;
    }

    .results-label {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .results-msg {
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.7;
      max-width: 380px;
      margin: 0 auto 28px;
    }

    .retry-btn {
      font-family: var(--font-display);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--accent);
      background: none;
      border: 1px solid var(--accent);
      padding: 9px 22px;
      border-radius: 3px;
      cursor: pointer;
    }

    .retry-btn:hover { background: var(--accent); color: #fff; }

    /* Score colouring */
    .results-score.s5 { color: #2a7a3e; }
    .results-score.s4 { color: var(--accent); }
    .results-score.s3 { color: #b56a00; }
    .results-score.s2 { color: var(--red-muted); }
  </style>
</head>
<body>

  <aside class="sidebar"></aside>

  <main class="main">

    <section class="intro">
      <h1 class="intro-heading">proveyourself.</h1>
      <p class="intro-body">
        Weekly questions. Some easy. One that nobody gets.
        Share it with your crew and see who actually knows things.
      </p>
    </section>

    <div class="divider"></div>

    <section class="feed">
      <h2 class="feed-heading">Current — Week 7</h2>

      <div class="quiz-block">
        <div class="quiz-header">
          <div>
            <div class="quiz-title">The Roman Empire</div>
            <div class="quiz-meta">5 questions · no time limit · no cheating</div>
          </div>
          <div class="quiz-progress" id="progress-text">1 / 5</div>
        </div>
        <div class="quiz-progress-bar-wrap">
          <div class="quiz-progress-bar" id="progress-bar"></div>
        </div>

        <!-- Question screen -->
        <div id="quiz-question-screen">
          <div class="quiz-body">
            <div class="question-text" id="q-text"></div>
            <div class="options" id="q-options"></div>
            <div class="feedback" id="q-feedback"></div>
          </div>
          <div class="quiz-footer">
            <span></span>
            <button class="next-btn" id="next-btn">Next →</button>
          </div>
        </div>

        <!-- Results screen -->
        <div class="results" id="results-screen">
          <div class="results-score" id="r-score"></div>
          <div class="results-label">out of 5</div>
          <div class="results-msg" id="r-msg"></div>
          <button class="retry-btn" onclick="startQuiz()">Try again</button>
        </div>
      </div>

    </section>

  </main>

  <script src="/sidebar.js"></script>
  <script>
    const questions = [
      {
        q: "In what year, according to tradition, was the city of Rome founded?",
        opts: ["753 BC", "509 BC", "264 BC", "44 BC"],
        ans: 0,
        feedback: "753 BC is the traditional founding date, attributed to Romulus — though historians treat this more as mythology than firm history."
      },
      {
        q: "Julius Caesar was assassinated on the Ides of March. What date is that?",
        opts: ["March 7", "March 15", "March 21", "March 31"],
        ans: 1,
        feedback: "The Ides of March is March 15th, 44 BC. Caesar was stabbed 23 times by a group of senators including Brutus and Cassius."
      },
      {
        q: "Which Roman emperor declared Christianity the official religion of the empire?",
        opts: ["Constantine I", "Nero", "Theodosius I", "Hadrian"],
        ans: 2,
        feedback: "Theodosius I made Nicene Christianity the state religion in 380 AD via the Edict of Thessalonica. Constantine gets credit for legalising it, but Theodosius made it mandatory."
      },
      {
        q: "The Colosseum in Rome could hold approximately how many spectators?",
        opts: ["10,000", "30,000", "50,000", "80,000"],
        ans: 2,
        feedback: "Around 50,000 — though some estimates go as high as 80,000. It was completed in 80 AD under Emperor Titus and remains the largest amphitheatre ever built."
      },
      {
        q: "Which of these was NOT one of the five 'Good Emperors' of the Nerva–Antonine dynasty?",
        opts: ["Marcus Aurelius", "Trajan", "Commodus", "Hadrian"],
        ans: 2,
        feedback: "Commodus — the one Joaquin Phoenix played in Gladiator — was definitely not a 'good' emperor. He was narcissistic, erratic, and eventually strangled in his bath. The five good emperors were Nerva, Trajan, Hadrian, Antoninus Pius, and Marcus Aurelius."
      }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    function startQuiz() {
      current = 0;
      score = 0;
      answered = false;
      document.getElementById('results-screen').classList.remove('visible');
      document.getElementById('quiz-question-screen').style.display = '';
      showQuestion();
    }

    function showQuestion() {
      answered = false;
      const q = questions[current];
      document.getElementById('q-text').textContent = q.q;
      document.getElementById('q-feedback').textContent = '';
      document.getElementById('next-btn').classList.remove('visible');

      const pct = (current / questions.length) * 100;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-text').textContent = `${current + 1} / ${questions.length}`;

      const opts = document.getElementById('q-options');
      opts.innerHTML = '';
      q.opts.forEach((o, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = o;
        btn.onclick = () => answer(i);
        opts.appendChild(btn);
      });
    }

    function answer(i) {
      if (answered) return;
      answered = true;
      const q = questions[current];
      const btns = document.querySelectorAll('.option-btn');
      btns.forEach((b, idx) => {
        b.disabled = true;
        if (idx === q.ans) b.classList.add('correct');
        else if (idx === i) b.classList.add('wrong');
      });
      if (i === q.ans) score++;
      document.getElementById('q-feedback').textContent = q.feedback;
      document.getElementById('next-btn').classList.add('visible');
      document.getElementById('next-btn').textContent =
        current === questions.length - 1 ? 'See results' : 'Next →';
    }

    document.getElementById('next-btn').addEventListener('click', () => {
      current++;
      if (current >= questions.length) {
        showResults();
      } else {
        showQuestion();
      }
    });

    function showResults() {
      document.getElementById('quiz-question-screen').style.display = 'none';
      const rs = document.getElementById('results-screen');
      rs.classList.add('visible');
      document.getElementById('progress-bar').style.width = '100%';
      document.getElementById('progress-text').textContent = 'done';

      const s = document.getElementById('r-score');
      s.textContent = `${score}/5`;
      s.className = 'results-score s' + score;

      const msgs = [
        "Et tu, Google? You really didn't know any of these.",
        "The senate is not impressed. Two more and you'd have a majority.",
        "Middle of the road. Hadrian would've expected better from a border wall enthusiast.",
        "Solid. You've clearly thought about the Roman Empire at least once this week.",
        "All five. You are Marcus Aurelius. Go touch grass."
      ];
      document.getElementById('r-msg').textContent = msgs[score] || msgs[0];
    }

    startQuiz();
  </script>
</body>
</html>
